<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龍魂流場 · 洛書渦流 v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }
        .sidebar {
            width: 310px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }
        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 20px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 4px;
        }
        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 12px;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .dna-badge {
            font-size: 10px;
            color: var(--anthropic-orange);
            background: rgba(217,119,87,0.08);
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: inline-block;
            font-family: 'Courier New', monospace;
        }
        .control-section { margin-bottom: 24px; }
        .control-section h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .control-section h3::before {

        }
        .seed-input {
            width: 100%;
            background: var(--anthropic-light);

        .control-group label {

        .slider-container {

        .slider-container input[type="range"] {

        .slider-container input[type="range"]::-webkit-slider-thumb {

        .value-display {
            font-family: 'Courier New', monospace;

            color: var(--anthropic-mid-gray);
            min-width: 40px;
            text-align: right;
        }
        .button {
            background: var(--anthropic-orange);
            color: white;

            padding: 9px 14px;
            border-radius: 6px;

        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button.ghost {
            background: transparent;
            color: var(--anthropic-dark);

        .button.ghost:hover { background: var(--anthropic-light); }
        .button.ghost.active {
            background: rgba(217,119,87,0.1);
            border-color: var(--anthropic-orange);

        .button-row { display: flex; gap: 6px; }
        .button-row .button { flex: 1; }
        .canvas-area {
            flex: 1;

        }
        #canvas-container {
            width: 100%;
            max-width: 900px;

        .equation-box {

        }
        .luoshu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            margin: 8px 0;
        }
        .luoshu-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Lora', serif;
        }
        .luoshu-cell.c369 { background: rgba(217,119,87,0.15); color: #c86641; }
        .luoshu-cell.c5   { background: rgba(20,20,19,0.08); color: #141413; border: 1px solid #141413; }
        .luoshu-cell.coth { background: rgba(106,155,204,0.12); color: #4a7ba8; }
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 3px;
        }
        .stat-row span:last-child { color: var(--anthropic-dark); font-weight: 500; }
        .divider {
            height: 1px;
            background: var(--anthropic-light-gray);
            margin: 16px 0;
        }
        @media (max-width: 700px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h1>龍魂流場</h1>
        <div class="subtitle">洛書渦流 · Luoshu Vortex v2.0</div>

        <!-- Luoshu Grid Display -->
        <div class="luoshu-grid" title="洛書九宮 · 行列對角線之和 = 15">
            <div class="luoshu-cell coth">4</div>
            <div class="luoshu-cell c369">9</div>
            <div class="luoshu-cell coth">2</div>

            <div class="luoshu-cell c5">5</div>
            <div class="luoshu-cell coth">7</div>
            <div class="luoshu-cell coth">8</div>

        <!-- KaTeX Equation -->
        <div class="equation-box">

        <div class="divider"></div>

        <!-- Seed Controls (FIXED) -->
        <div class="control-section">
            <h3>種子 Seed</h3>
            <input type="number" id="seed-input" class="seed-input" value="9622" onchange="updateSeed()">
            <div class="seed-controls">
                <button class="button secondary" onclick="previousSeed()">← 前</button>
                <button class="button secondary" onclick="nextSeed()">後 →</button>

        <!-- Parameters Section -->
        <div class="control-section">
            <h3>參數 Parameters</h3>

            <div class="control-group">
                <label>粒子數量 Particles <span class="value-display" id="particleCount-value">1200</span></label>
                <div class="slider-container">

            <div class="control-group">
                <label>場強度 Field Strength <span class="value-display" id="fieldStrength-value">1.0</span></label>
                <div class="slider-container">
                    <input type="range" id="fieldStrength" min="0.2" max="3.0" step="0.1" value="1.0"

            <div class="control-group">
                <label>能量衰減 α decay <span class="value-display" id="energyAlpha-value">0.5</span></label>
                <div class="slider-container">
                    <input type="range" id="energyAlpha" min="0.0" max="2.0" step="0.1" value="0.5"
                           oninput="updateParam('energyAlpha', this.value)">

        <div class="divider"></div>

        <!-- Colors -->

                           onchange="updateColor('mid', this.value)"
                           style="width:32px;height:28px;border:none;border-radius:4px;cursor:pointer;background:none;padding:0">

                    <input type="color" id="color-slow" value="#788c5d"
                           onchange="updateColor('slow', this.value)"
                           style="width:32px;height:28px;border:none;border-radius:4px;cursor:pointer;background:none;padding:0">

                <button class="button secondary" onclick="resetParameters()">↩ 重置</button>

            <div class="button-row" style="margin-bottom:6px">
                <button class="button ghost" id="grid-btn" onclick="toggleGrid()">☰ 九宮格</button>
                <button class="button ghost" id="pause-btn" onclick="togglePause()">⏸ 暫停</button>

            <button class="button tertiary" onclick="downloadPNG()">⬇ 下載 PNG</button>
        </div>

        <div style="font-size:10px;color:var(--anthropic-mid-gray);line-height:1.7;margin-top:8px">
            UID9622 × Anthropic Standard ✅<br>
            洛書九宮 · 不動點定理<br>
            f(UID9622) = UID9622 · 北極星 🌟

    <div class="canvas-area">
        <div id="canvas-container"></div>

<script>
// ═══════════════════════════════════════════════════════════
// 洛書九宮矩陣 · Luoshu Magic Square
// ═══════════════════════════════════════════════════════════
const LUOSHU = [[4,9,2],[3,5,7],[8,1,6]];
// Row/col/diag all sum to 15. Center=5=不動點=T0

// ═══════════════════════════════════════════════════════════
// PARAMETERS
// ═══════════════════════════════════════════════════════════
let params = {
    seed: 9622,
    particleCount: 1200,
    flowSpeed: 1.2,
    fieldStrength: 1.0,
    resonance369: 0.6,
    trailDecay: 0.96,
    energyAlpha: 0.5,
    colors: { fast: '#d97757', mid: '#6a9bcc', slow: '#788c5d' }
};
const defaultParams = JSON.parse(JSON.stringify(params));

let showGrid = false;
let paused = false;
let frameT = 0;
let _p5inst;

// ═══════════════════════════════════════════════════════════
// KaTeX EQUATION
// ═══════════════════════════════════════════════════════════
window.addEventListener('load', () => {
    try {
        katex.render(
            "\\Psi = \\hat{T} \\otimes \\hat{D} \\otimes \\hat{L}(5_{\\text{不動}})",
            document.getElementById('katex-eq'),
            { throwOnError: false, displayMode: true, fontSize: '0.85em' }
        );
    } catch(e) {
        document.getElementById('katex-eq').textContent = 'Ψ = T̂ ⊗ D̂ ⊗ L̂';
    }
});

// ═══════════════════════════════════════════════════════════
// P5.JS ALGORITHM
// ═══════════════════════════════════════════════════════════
new p5(function(p) {
    _p5inst = p;
    const W = 900, H = 900;
    let particles = [];

    // ── Vector field: angle at (x, y) ──
    function fieldAngle(x, y) {
        const gx = Math.min(Math.floor(x / W * 3), 2);
        const gy = Math.min(Math.floor(y / H * 3), 2);
        const val = LUOSHU[gy][gx];

        // Center cell (5) = unmoved anchor: tangential circular flow
        if (val === 5) {
            return Math.atan2(y - H/2, x - W/2) + Math.PI/2;
        }

        // Base angle from Luoshu value (0–9 → 0–2π)
        const base = (val / 9) * p.TWO_PI;

        // 369 resonance: triple-frequency Perlin at ×3, ×6, ×9
        const t = frameT * 0.002;
        const s = params.seed * 0.01;
        const n3 = p.noise(x*0.003*3,      y*0.003*3,      t*3 + s)    * p.TWO_PI;
        const n6 = p.noise(x*0.003*6 + 50, y*0.003*6 + 50, t*6 + s+1)  * p.TWO_PI;
        const n9 = p.noise(x*0.003*9 +100, y*0.003*9 +100, t*9 + s+2)  * p.TWO_PI;
        const resonance = ((n3 + n6 + n9) / 3) * params.resonance369;

        // Local micro noise for organic texture
        const micro = p.noise(x*0.006 + s, y*0.006 + s + 200) * Math.PI * 0.5;

        return base + resonance + micro * 0.4;
    }

    // ── Energy intensity at (x, y) ──
    function energyAt(x, y) {
        const gx = Math.min(Math.floor(x / W * 3), 2);
        const gy = Math.min(Math.floor(y / H * 3), 2);
        const val = LUOSHU[gy][gx];
        const R = p.dist(x, y, W/2, H/2) / (W * 0.5);
        const base = p.noise(x*0.004 + params.seed*0.1, y*0.004);
        const decay = Math.pow(R * 8 + 1, -params.energyAlpha);
        return base * decay * (val / 9) * params.fieldStrength;
    }

    // ── Hex to RGB ──
    function hexToRGB(hex) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return [r,g,b];
    }

    // ── Particle class ──
    class Particle {
        constructor() { this.reset(); }
        reset() {
            // Spawn at edges (60%) or random (40%)
            if (p.random() < 0.6) {
                const edge = Math.floor(p.random(4));
                if (edge === 0)      { this.x = p.random(W); this.y = 0; }
                else if (edge === 1) { this.x = W;           this.y = p.random(H); }
                else if (edge === 2) { this.x = p.random(W); this.y = H; }
                else                 { this.x = 0;           this.y = p.random(H); }
            } else {
                this.x = p.random(W);
                this.y = p.random(H);
            }
            this.vx = 0; this.vy = 0;
            this.age = 0;
            this.maxAge = p.random(80, 320);
            this.speedMult = p.random(0.5, 1.8);
        }
        update() {
            const a = fieldAngle(this.x, this.y);
            const e = energyAt(this.x, this.y);
            const s = params.flowSpeed * this.speedMult * (0.4 + e * 2.5);
            this.vx = this.vx * 0.82 + Math.cos(a) * s * 0.18;
            this.vy = this.vy * 0.82 + Math.sin(a) * s * 0.18;
            this.x += this.vx;
            this.y += this.vy;
            this.age++;
            if (this.x < -5 || this.x > W+5 || this.y < -5 || this.y > H+5 || this.age > this.maxAge) {
                this.reset();
            }
        }
        draw() {
            const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
            const e = energyAt(this.x, this.y);
            const lifeRatio = 1 - this.age / this.maxAge;

            // Color selection by speed
            let col;
            if (speed > 1.8) col = hexToRGB(params.colors.fast);
            else if (speed > 0.7) col = hexToRGB(params.colors.mid);
            else col = hexToRGB(params.colors.slow);

            // Blend toward energy-based luminosity
            const brightness = 0.4 + e * 1.6;
            const r = Math.min(255, col[0] * brightness);
            const g = Math.min(255, col[1] * brightness);
            const b = Math.min(255, col[2] * brightness);
            const alpha = lifeRatio * 170;

            p.stroke(r, g, b, alpha);
            p.strokeWeight(p.map(e, 0, 1, 0.4, 1.8));
            p.line(this.x - this.vx * 2.5, this.y - this.vy * 2.5, this.x, this.y);
        }
    }

    // ── Draw 九宮格 ghost overlay ──
    function drawLuoshuGhost(alpha) {
        const cw = W / 3, ch = H / 3;
        p.noFill();
        for (let gy = 0; gy < 3; gy++) {
            for (let gx = 0; gx < 3; gx++) {
                const val = LUOSHU[gy][gx];
                const cx = (gx + 0.5) * cw;
                const cy = (gy + 0.5) * ch;
                const r = (val / 9) * cw * 0.38;

                if (val % 3 === 0) {
                    // 3,6,9 = 橙色 orange
                    p.stroke(217, 119, 87, alpha);
                    p.strokeWeight(1.0);
                } else if (val === 5) {
                    // Center = white
                    p.stroke(240, 235, 220, alpha * 1.5);
                    p.strokeWeight(1.2);
                } else {
                    // others = blue
                    p.stroke(106, 155, 204, alpha * 0.6);
                    p.strokeWeight(0.5);
                }
                p.ellipse(cx, cy, r * 2, r * 2);

                // Grid lines
                if (gx < 2) {
                    p.stroke(200, 195, 185, alpha * 0.4);
                    p.strokeWeight(0.5);
                    p.line((gx+1)*cw, 0, (gx+1)*cw, H);
                }
                if (gy < 2) {
                    p.stroke(200, 195, 185, alpha * 0.4);
                    p.strokeWeight(0.5);
                    p.line(0, (gy+1)*ch, W, (gy+1)*ch);
                }
            }
        }
    }

    function initSystem() {
        p.randomSeed(params.seed);
        p.noiseSeed(params.seed);
        frameT = 0;
        particles = [];
        for (let i = 0; i < params.particleCount; i++) {
            particles.push(new Particle());
        }
        p.background(10, 8, 18);
    }

    p.setup = function() {
        const cv = p.createCanvas(W, H);
        cv.parent('canvas-container');
        initSystem();
    };

    p.draw = function() {
        if (paused) return;
        frameT++;

        // Trail fade
        p.noStroke();
        p.fill(10, 8, 18, (1 - params.trailDecay) * 255);
        p.rect(0, 0, W, H);

        // Draw particles
        p.noFill();
        for (const pt of particles) {
            pt.update();
            pt.draw();
        }

        // Ghost grid: auto-pulse every ~360 frames, or forced
        const ghostPhase = frameT % 360;
        if (ghostPhase < 18) {
            const a = ghostPhase < 9
                ? p.map(ghostPhase, 0, 9, 0, 55)
                : p.map(ghostPhase, 9, 18, 55, 0);
            drawLuoshuGhost(a);
        }
        if (showGrid) drawLuoshuGhost(45);

        // Update stats every 30 frames
        if (frameT % 30 === 0) {
            document.getElementById('stat-fps').textContent = Math.round(p.frameRate());
            document.getElementById('stat-frame').textContent = frameT;
            document.getElementById('stat-pts').textContent = particles.length;
        }
    };
});

// ═══════════════════════════════════════════════════════════
// UI HANDLERS
// ═══════════════════════════════════════════════════════════
function updateParam(name, val) {
    params[name] = parseFloat(val);
    document.getElementById(name + '-value').textContent = parseFloat(val);
    if (name === 'particleCount') regenScene();
}

function updateColor(key, val) {
    params.colors[key] = val;
    document.getElementById('color-' + key + '-val').textContent = val;
}

function updateSeedDisplay() {
    document.getElementById('seed-input').value = params.seed;
}
function updateSeed() {
    const v = parseInt(document.getElementById('seed-input').value);
    if (!isNaN(v)) { params.seed = v; regenScene(); }
    else updateSeedDisplay();
}
function previousSeed() { params.seed = Math.max(1, params.seed - 1); updateSeedDisplay(); regenScene(); }
function nextSeed()     { params.seed = params.seed + 1;              updateSeedDisplay(); regenScene(); }
function randomSeedAndUpdate() {
    params.seed = Math.floor(Math.random() * 99999) + 1;
    updateSeedDisplay();
    regenScene();
}

function regenScene() {
    if (_p5inst) {
        _p5inst.randomSeed(params.seed);
        _p5inst.noiseSeed(params.seed);
        _p5inst.background(10, 8, 18);
        // Re-init particles via draw loop re-seed
        _p5inst.setup();
    }
}

function resetParameters() {
    params = JSON.parse(JSON.stringify(defaultParams));
    // Sync sliders
    ['particleCount','flowSpeed','fieldStrength','resonance369','trailDecay','energyAlpha'].forEach(k => {
        const el = document.getElementById(k);
        if (el) el.value = params[k];
        const vd = document.getElementById(k + '-value');
        if (vd) vd.textContent = params[k];
    });
    // Sync colors
    ['fast','mid','slow'].forEach(k => {
        document.getElementById('color-' + k).value = params.colors[k];
        document.getElementById('color-' + k + '-val').textContent = params.colors[k];
    });
    updateSeedDisplay();
    regenScene();
}

function toggleGrid() {
    showGrid = !showGrid;
    const btn = document.getElementById('grid-btn');
    btn.classList.toggle('active', showGrid);
}

function togglePause() {
    paused = !paused;
    const btn = document.getElementById('pause-btn');
    btn.classList.toggle('active', paused);
    btn.textContent = paused ? '▶ 繼續' : '⏸ 暫停';
}

function downloadPNG() {
    if (_p5inst) _p5inst.saveCanvas('龍魂流場-seed' + params.seed, 'png');
}
</script>
