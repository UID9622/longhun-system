name: 🛡️ Anti-Fraud Sentinel

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'  # 每6小时扫描一次

jobs:
  dna-guardian:
    name: 🧬 DNA守护者
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 检查DNA完整性
      run: |
        python anti-fraud-sentinel/.github/scripts/dna_guardian.py
      continue-on-error: true
    
    - name: 发现DNA被删除时的自动响应
      if: failure()
      run: |
        echo "🚨 反盗用警报：检测到DNA追溯码被删除！"
        echo "⚠️ 这是严重的盗用行为"
        echo "📦 正在生成证据包..."

  gpg-verifier:
    name: 🔐 GPG验证器
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    - name: 检查GPG指纹
      run: |
        python anti-fraud-sentinel/.github/scripts/gpg_verifier.py

