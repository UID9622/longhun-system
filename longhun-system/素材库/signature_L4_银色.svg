<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- 透明底 -->
  <rect width="200" height="200" fill="none"/>

  <!-- 外圈银色双环 -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#A8A8A8" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#C0C0C0" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- 内圆底色（半透明银白） -->
  <circle cx="100" cy="100" r="84" fill="#F8F8F8" opacity="0.92"/>

  <!-- 龍字水印 -->
  <text x="100" y="123" text-anchor="middle"
        font-family="'PingFang SC','STSong',serif"
        font-size="110" font-weight="900"
        fill="#C0C0C0" opacity="0.09">龍</text>

  <!-- 顶部线 -->
  <line x1="42" y1="68" x2="158" y2="68" stroke="#A8A8A8" stroke-width="0.8"/>

  <!-- 龍魂系統 -->
  <text x="100" y="60" text-anchor="middle"
        font-family="'PingFang SC','STSong',serif"
        font-size="13" font-weight="700"
        fill="#707070" letter-spacing="4">龍魂系統</text>

  <!-- 诸葛鑫 主体 -->
  <text x="100" y="115" text-anchor="middle"
        font-family="'PingFang SC','STSong',serif"
        font-size="42" font-weight="900"
        fill="#484848" letter-spacing="4">诸葛鑫</text>

  <!-- 底部线 -->
  <line x1="42" y1="128" x2="158" y2="128" stroke="#A8A8A8" stroke-width="0.8"/>

  <!-- UID9622 -->
  <text x="100" y="148" text-anchor="middle"
        font-family="'Courier New',monospace"
        font-size="11" font-weight="500"
        fill="#909090" letter-spacing="2">UID · 9622</text>

  <!-- L4标记 -->
  <text x="100" y="168" text-anchor="middle"
        font-family="'PingFang SC',sans-serif"
        font-size="10" font-weight="400"
        fill="#A8A8A8" letter-spacing="3">L4 · 对外公开</text>

  <!-- 左右银点 -->
  <circle cx="46" cy="100" r="2" fill="#C0C0C0" opacity="0.6"/>
  <circle cx="154" cy="100" r="2" fill="#C0C0C0" opacity="0.6"/>

</svg>
