<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">

  <!-- 墨底 -->
  <circle cx="160" cy="160" r="158" fill="#0d0d0d"/>

  <!-- 朱砂红外圈 -->
  <circle cx="160" cy="160" r="156" fill="none" stroke="#C41A0D" stroke-width="3"/>
  <circle cx="160" cy="160" r="148" fill="none" stroke="#C41A0D" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- 龍字水印（沉在底层，若隐若现） -->
  <text x="160" y="195" text-anchor="middle"
        font-family="'PingFang SC','Hiragino Sans GB',serif"
        font-size="168" font-weight="900"
        fill="#C41A0D" opacity="0.07"
        letter-spacing="0">龍</text>

  <!-- 顶部细线 -->
  <line x1="90" y1="98" x2="230" y2="98" stroke="#C41A0D" stroke-width="0.8" opacity="0.6"/>

  <!-- 诸葛鑫 · 主体 -->
  <text x="160" y="175" text-anchor="middle"
        font-family="'PingFang SC','Hiragino Sans GB','STSong',serif"
        font-size="62" font-weight="900"
        fill="#e8dfd0"
        letter-spacing="6">诸葛鑫</text>

  <!-- 底部细线 -->
  <line x1="90" y1="195" x2="230" y2="195" stroke="#C41A0D" stroke-width="0.8" opacity="0.6"/>

  <!-- 顶部小字：龍魂系統 -->
  <text x="160" y="82" text-anchor="middle"
        font-family="'PingFang SC','Hiragino Sans GB',serif"
        font-size="15" font-weight="600"
        fill="#C41A0D" letter-spacing="5"
        opacity="0.9">龍  魂  系  統</text>

  <!-- 底部小字：UID9622 -->
  <text x="160" y="228" text-anchor="middle"
        font-family="'Courier New',monospace"
        font-size="12" font-weight="400"
        fill="#C41A0D" letter-spacing="3"
        opacity="0.7">UID · 9622</text>

  <!-- 左右朱砂点 -->
  <circle cx="96" cy="160" r="3" fill="#C41A0D" opacity="0.5"/>
  <circle cx="224" cy="160" r="3" fill="#C41A0D" opacity="0.5"/>

  <!-- 朱砂红内圈（最外一圈收边） -->
  <circle cx="160" cy="160" r="140" fill="none" stroke="#C41A0D" stroke-width="0.5" opacity="0.3"/>

</svg>
