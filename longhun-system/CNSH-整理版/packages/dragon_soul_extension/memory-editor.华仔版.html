<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐉 龍魂记忆编辑器 v2.0 - 扩展集成版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; padding: 20px;
}
.container {
  max-width: 1400px; margin: 0 auto;
  background: rgba(255,255,255,0.95);
  border-radius: 20px; padding: 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid #667eea; padding-bottom: 20px; }
.header h1 { font-size: 36px; color: #667eea; margin-bottom: 10px; }
.header .subtitle { color: #666; font-size: 14px; margin-bottom: 10px; }
.system-status {
  background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
  color: white; padding: 10px 20px; border-radius: 8px;
  font-size: 13px; display: inline-block;
}
.main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.editor-panel, .result-panel { background: #f8f9fa; border-radius: 10px; padding: 20px; }
.panel-title {
  font-size: 18px; font-weight: bold; color: #333;
  margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #667eea;
}
textarea {
  width: 100%; min-height: 400px; padding: 15px;
  border: 2px solid #ddd; border-radius: 8px;
  font-size: 14px; font-family: "Consolas", "Monaco", monospace;
  resize: vertical; transition: border-color 0.3s;
}
textarea:focus { outline: none; border-color: #667eea; }
.controls { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
button {
  padding: 12px 24px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s;
}
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
.btn-secondary { background: #6c757d; color: white; }
.btn-secondary:hover { background: #5a6268; }
.btn-success { background: #28a745; color: white; }
.btn-success:hover { background: #218838; }
.result-box {
  background: white; border: 2px solid #ddd; border-radius: 8px; padding: 15px;
  min-height: 200px; font-family: "Consolas", "Monaco", monospace;
  font-size: 13px; white-space: pre-wrap; word-wrap: break-word;
  max-height: 400px; overflow-y: auto;
}
.status-bar {
  background: #343a40; color: white; padding: 15px;
  border-radius: 10px; margin-top: 20px; font-size: 13px;
}
.status-item { display: inline-block; margin-right: 20px; }
.status-label { color: #adb5bd; }
.status-value { color: #28a745; font-weight: bold; }
.memory-card {
  background: white; border: 2px solid #e0e0e0;
  border-radius: 10px; padding: 15px; margin-bottom: 15px;
}
.memory-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #e0e0e0;
}
.memory-dna { font-size: 12px; color: #667eea; font-weight: bold; }
.memory-time { font-size: 11px; color: #999; }
.memory-content { font-size: 13px; line-height: 1.6; color: #333; }
.action-bar { display: flex; gap: 10px; margin-top: 10px; }
.btn-small { padding: 6px 12px; font-size: 12px; }
@media (max-width: 768px) { .main-layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🐉 龍魂记忆编辑器 v2.0</h1>
    <div class="subtitle">【扩展集成版】DNA追溯 | 太极算法 | 永久保存 | 智能压缩 | 快速还原</div>
    <div class="system-status">
      ✅ 系统状态：已连接 | 🗄️ IndexedDB 本地存储 | 🧬 DNA 追溯码生成 | ☯️ 太极算法变量提取
    </div>
  </div>

  <div class="main-layout">
    <div class="editor-panel">
      <div class="panel-title">📝 记忆输入</div>
      <textarea id="inputText" placeholder="在此输入你的记忆、想法、笔记...

🐉 系统会自动：
✅ 生成 DNA 追溯码
✅ 提取太极算法变量
✅ 压缩记忆内容
✅ 保存到 IndexedDB
✅ 支持快速还原"></textarea>
      <div class="controls">
        <button class="btn-primary" onclick="processMemory()">🧠 处理记忆</button>
        <button class="btn-primary" onclick="compressMemory()">📦 压缩记忆</button>
        <button class="btn-success" onclick="saveToSystem()">💾 保存到系统</button>
        <button class="btn-secondary" onclick="clearInput()">🗑️ 清空</button>
      </div>
    </div>
    <div class="result-panel">
      <div class="panel-title">✨ 处理结果</div>
      <div id="resultBox" class="result-box">等待输入记忆...</div>
    </div>
  </div>

  <div class="editor-panel" style="margin-top:20px;">
    <div class="panel-title">🗄️ 记忆库（IndexedDB）</div>
    <div id="memoryLibrary">
      <div style="color:#999;text-align:center;padding:40px;">
        暂无保存的记忆<br><small>（IndexedDB 本地存储）</small>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-item"><span class="status-label">记忆总数：</span><span class="status-value" id="memoryCount">0</span></span>
    <span class="status-item"><span class="status-label">本地存储：</span><span class="status-value" id="storageSize">0 KB</span></span>
    <span class="status-item"><span class="status-label">压缩率：</span><span class="status-value" id="compressionRate">0%</span></span>
    <span class="status-item"><span class="status-label">最后更新：</span><span class="status-value" id="lastUpdate">从未</span></span>
  </div>
</div>

<script>
// ===== 初始化存储 =====
let currentMemory = null;

async function initSystem() {
  console.log('🐉 龍魂记忆编辑器 v2.0 启动');
  console.log('DNA: #龍芯⚡️2026-03-03-记忆编辑器-扩展集成版');

  // 初始化存储管理器
  if (window.storageManager) {
    await window.storageManager.init();
    await loadMemories();
    console.log('✅ 存储系统初始化完成');
  } else {
    console.error('❌ 存储管理器未加载');
    alert('存储管理器未加载，请确保扩展已正确安装');
  }
}

// ===== 核心函数 =====
function processMemory() {
  const input = document.getElementById('inputText').value.trim();
  if (!input) { alert('请输入记忆内容！'); return; }

  // 生成 DNA 追溯码
  const dna = window.dnaGenerator ? window.dnaGenerator.generate(input, 'MEMORY') : 'DNA生成器未加载';

  // 提取太极算法变量
  const taijiVars = window.taijiExtractor ? window.taijiExtractor.extract(input) : null;

  // 压缩记忆
  const compressed = window.memoryCompressor && taijiVars ?
    window.memoryCompressor.compress(input, taijiVars, 'medium') : null;

  let result = `🧬 DNA追溯码：\n${dna}\n\n`;
  result += `☯️ 太极算法变量：\n`;
  if (taijiVars) {
    result += `  字数：${taijiVars.字数}\n  行数：${taijiVars.行数}\n`;
    result += `  关键词：${taijiVars.关键词.map(k => k.词).join(', ')}\n`;
    result += `  情感：${taijiVars.情感}\n  重要程度：${taijiVars.重要程度}/10\n\n`;
  }
  if (compressed) {
    result += `📦 记忆压缩：\n`;
    result += `  原始：${compressed.原始长度}字 → 压缩后：${compressed.压缩后长度}字\n`;
    result += `  压缩率：${compressed.压缩率}%\n`;
    result += `  完整哈希：${compressed.完整哈希}\n\n`;
    result += `📝 摘要：\n${compressed.摘要}\n\n`;
  }
  result += `💾 准备保存到：\n✅ IndexedDB\n✅ 本地文件（可选）\n✅ 支持快速还原`;

  document.getElementById('resultBox').textContent = result;
  currentMemory = {
    DNA: dna,
    原始内容: input,
    太极变量: taijiVars,
    压缩数据: compressed,
    创建时间: new Date().toISOString()
  };
}

function compressMemory() {
  const input = document.getElementById('inputText').value.trim();
  if (!input) { alert('请输入记忆内容！'); return; }

  const taijiVars = window.taijiExtractor ? window.taijiExtractor.extract(input) : null;
  const compressed = window.memoryCompressor && taijiVars ?
    window.memoryCompressor.compress(input, taijiVars, 'medium') : null;

  if (!compressed) {
    alert('压缩模块未加载');
    return;
  }

  let result = `📦 记忆压缩结果：\n\n`;
  result += `原始：${compressed.原始长度}字 → 压缩后：${compressed.压缩后长度}字\n`;
  result += `压缩率：${compressed.压缩率}% | 节省：${compressed.原始长度 - compressed.压缩后长度}字\n\n`;
  result += `📝 摘要：\n${compressed.摘要}\n\n`;
  if (taijiVars) {
    result += `🔑 关键词：${taijiVars.关键词.map(k => k.词).join(', ')}\n💭 情感：${taijiVars.情感}`;
  }

  document.getElementById('resultBox').textContent = result;
  document.getElementById('compressionRate').textContent = compressed.压缩率 + '%';
}

async function saveToSystem() {
  if (!currentMemory) { alert('请先处理记忆！'); return; }
  if (!window.storageManager) { alert('存储管理器未加载！'); return; }

  try {
    await window.storageManager.saveMemory(currentMemory);
    await loadMemories();
    document.getElementById('resultBox').textContent =
      `✅ 记忆已保存！\n\n📍 已保存位置：\n✅ IndexedDB - 永久存储\n✅ DNA追溯码：${currentMemory.DNA}\n✅ 支持快速还原`;
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
    document.getElementById('inputText').value = '';
    currentMemory = null;
    alert('✅ 记忆已成功保存到系统！');
  } catch (error) {
    alert('保存失败：' + error.message);
    console.error('保存失败:', error);
  }
}

async function loadMemories() {
  if (!window.storageManager) return;

  try {
    const memories = await window.storageManager.getAllMemories();
    updateMemoryLibrary(memories);
    updateStorageInfo(memories);
  } catch (error) {
    console.error('加载记忆失败:', error);
  }
}

function updateMemoryLibrary(memories = []) {
  const container = document.getElementById('memoryLibrary');
  if (memories.length === 0) {
    container.innerHTML = '<div style="color:#999;text-align:center;padding:40px;">暂无保存的记忆<br><small>（IndexedDB 本地存储）</small></div>';
    document.getElementById('memoryCount').textContent = '0';
    return;
  }

  container.innerHTML = memories.map((m, i) => `
    <div class="memory-card">
      <div class="memory-header">
        <div class="memory-dna">${m.DNA}</div>
        <div class="memory-time">${new Date(m.创建时间).toLocaleString('zh-CN')}</div>
      </div>
      <div class="memory-content"><strong>摘要：</strong>${m.压缩数据 ? m.压缩数据.摘要 : '无摘要'}</div>
      <div style="margin-top:10px;font-size:12px;">
        关键词：${m.太极变量 ? m.太极变量.关键词.map(k => k.词).join(', ') : '无'} |
        情感：${m.太极变量 ? m.太极变量.情感 : '未知'} |
        重要：${m.太极变量 ? m.太极变量.重要程度 : 0}/10 |
        压缩率：${m.压缩数据 ? m.压缩数据.压缩率 : 0}%
      </div>
      <div class="action-bar">
        <button class="btn-small btn-primary" onclick="viewMemory('${m.DNA}')">查看</button>
        <button class="btn-small btn-secondary" onclick="deleteMemory('${m.DNA}')">删除</button>
        <button class="btn-small btn-success" onclick="restoreMemory('${m.DNA}')">还原</button>
      </div>
    </div>
  `).join('');

  document.getElementById('memoryCount').textContent = memories.length;
}

async function viewMemory(dna) {
  if (!window.storageManager) return;

  try {
    const memory = await window.storageManager.getMemory(dna);
    if (memory) {
      document.getElementById('inputText').value = memory.原始内容;
      document.getElementById('resultBox').textContent =
        `🧬 DNA：${memory.DNA}\n\n📝 完整内容：\n${memory.原始内容}\n\n☯️ 太极变量：\n${JSON.stringify(memory.太极变量, null, 2)}`;
    }
  } catch (error) {
    console.error('查看记忆失败:', error);
  }
}

async function deleteMemory(dna) {
  if (!window.storageManager) return;

  if (confirm('确定要删除这条记忆吗？')) {
    try {
      await window.storageManager.deleteMemory(dna);
      await loadMemories();
      alert('✅ 记忆已删除');
    } catch (error) {
      alert('删除失败：' + error.message);
    }
  }
}

async function restoreMemory(dna) {
  if (!window.memoryRestorer || !window.storageManager) {
    alert('还原模块未加载');
    return;
  }

  try {
    const memory = await window.storageManager.getMemory(dna);
    if (!memory) {
      alert('记忆不存在');
      return;
    }

    const result = await window.memoryRestorer.restore(dna, memory.压缩数据, {
      useStorage: true,
      requireFull: false
    });

    if (result.success) {
      let output = `🧬 还原结果：\n\n`;
      output += `DNA：${result.DNA}\n`;
      output += `还原方式：${result.还原方式 === 'full' ? '完整还原' : '摘要还原'}\n`;
      output += `还原质量：${result.还原质量}%\n\n`;
      output += `📝 还原内容：\n${result.原始内容}\n\n`;

      if (result.警告) {
        output += `⚠️ 警告：${result.警告}\n`;
      }

      document.getElementById('resultBox').textContent = output;
    } else {
      alert('还原失败：' + result.错误);
    }
  } catch (error) {
    alert('还原失败：' + error.message);
    console.error('还原失败:', error);
  }
}

function updateStorageInfo(memories = []) {
  document.getElementById('storageSize').textContent =
    Math.round(JSON.stringify(memories).length / 1024) + ' KB';
}

function clearInput() {
  document.getElementById('inputText').value = '';
  document.getElementById('resultBox').textContent = '等待输入记忆...';
  currentMemory = null;
}

// ===== 初始化 =====
window.onload = function() {
  initSystem();
};
</script>
</body>
</html>
