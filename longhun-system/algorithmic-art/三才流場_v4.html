<script>
// ═══════════════════════════════════════════════════════════════
//  三才流場 v4.0 · 龍盾接入版
//  宝宝P72 = 人场中枢（紫色·护身符）
//  洛书引擎 × :9622 双向实时
//  DNA: #龍芯⚡️2026-03-30-三才流場-v4.0 · UID9622
// ═══════════════════════════════════════════════════════════════

const API_BASE = 'http://localhost:9622';

let params = {
  seed: 9622, numP: 2000, nFreq: 0.003, step: 1.8, life: 120, alpha: 18,
  wH: 35, wE: 15, wP: 50,
  cH: [74,144,217], cE: [124,184,124], cP: [195,155,211], cBg: [10,10,15]
};

// ── 龍盾全局状态 ──────────────────────────────────────────────
const shield = {
  connected: false,
  ethicsStatus: 'unknown',   // green / orange / red
  ethicsTint: null,          // [r,g,b] 叠加色调
  activePersona: '—',
  auditCount: 0,
  merkleValue: 0,
  auditParticles: [],        // 留痕粒子（永不消亡）
  lastRouteResult: null,
};

// ── 洛书九宫格 ────────────────────────────────────────────────
// 戴九履一，左三右七，二四为肩，六八为足，五居中央
const LUOSHU = [
  {x:0.5, y:0.5, v:5},  // 中 5（阳·吸引·DNA不动点）
  {x:0.5, y:0.1, v:9},  // 北 9（阳·吸引）
  {x:0.5, y:0.9, v:1},  // 南 1（阳·吸引）
  {x:0.1, y:0.5, v:3},  // 东 3（阳·吸引）
  {x:0.9, y:0.5, v:7},  // 西 7（阳·吸引）
  {x:0.9, y:0.1, v:8},  // 东北 8（阴·排斥）
  {x:0.1, y:0.1, v:6},  // 西北 6（阴·排斥）
  {x:0.9, y:0.9, v:4},  // 东南 4（阴·排斥）
  {x:0.1, y:0.9, v:2}   // 西南 2（阴·排斥）
];

let particles = [], myp5, canvasG;

// ═══ p5.js 核心 ═══════════════════════════════════════════════
const sketch = (p) => {
  let W = 800, H = 800;

  p.setup = () => {
    let cnv = p.createCanvas(W, H);
    cnv.parent('canvas-wrap');
    p.randomSeed(params.seed);
    p.noiseSeed(params.seed);
    canvasG = p.createGraphics(W, H);
    initParticles(p);
    let bg = params.cBg;
    canvasG.background(bg[0], bg[1], bg[2]);
    p.background(bg[0], bg[1], bg[2]);
  };

  p.draw = () => {
    p.image(canvasG, 0, 0);
    updateParticles(p, canvasG);
    drawAuditParticles(p);   // 留痕粒子画在最上层
    drawShieldPulse(p);      // 龍盾光晕
    if (shield.ethicsTint) applyEthicsTint(p); // 向善四律染色
  };
};

function initParticles(p) {
  particles = [];
  for (let i = 0; i < params.numP; i++) particles.push(newParticle(p));
}

function newParticle(p) {
  let r = p.random();
  let threshH = params.wH / 100;
  let threshE = (params.wH + params.wE) / 100;
  return {
    x: p.random(800), y: p.random(800),
    age: p.floor(p.random(params.life)),
    maxAge: params.life + p.floor(p.random(60)),
    humanBias: p.random(p.TWO_PI),
    flavor: r < threshH ? 0 : (r < threshE ? 1 : 2),
    isAudit: false,
  };
}

function sanCaiAngle(p, x, y, humanBias) {
  // ☰ 天场：Perlin噪声 × 系统熵权重
  let t = p.frameCount * 0.003;
  let heavenAngle = p.noise(x * params.nFreq, y * params.nFreq, t) * p.TWO_PI * 4;

  // ☷ 地场：洛书九宫格·Merkle密度调制
  let earthScale = 1 + shield.merkleValue * 0.5; // 密度越高，地场越强
  let ex = 0, ey = 0;
  for (let node of LUOSHU) {
    let dx = node.x - x / 800;
    let dy = node.y - y / 800;
    let dist2 = dx * dx + dy * dy + 0.0001;
    let sign = (node.v % 2 === 1) ? 1 : -1;
    let force = sign * node.v / (dist2 * 500) * earthScale;
    ex += dx * force;
    ey += dy * force;
  }
  let earthAngle = p.atan2(ey, ex);

  // ☱ 宝宝P72·龍盾：种子偏置旋转（中枢意志）
  let humanAngle = humanBias + t * 0.5;

  let wH = params.wH / 100, wE = params.wE / 100, wP = params.wP / 100;
  let total = wH + wE + wP;
  wH /= total; wE /= total; wP /= total;

  let vx = p.cos(heavenAngle)*wH + p.cos(earthAngle)*wE + p.cos(humanAngle)*wP;
  let vy = p.sin(heavenAngle)*wH + p.sin(earthAngle)*wE + p.sin(humanAngle)*wP;
  return p.atan2(vy, vx);
}

function updateParticles(p, g) {
  for (let pt of particles) {
    if (pt.isAudit) continue; // 留痕粒子另行处理
    let angle = sanCaiAngle(p, pt.x, pt.y, pt.humanBias);
    let newX = pt.x + p.cos(angle) * params.step;
    let newY = pt.y + p.sin(angle) * params.step;

    let col = pt.flavor === 0 ? params.cH : (pt.flavor === 1 ? params.cE : params.cP);
    let lifeRatio = 1 - pt.age / pt.maxAge;
    let a = params.alpha * lifeRatio;

    g.stroke(col[0], col[1], col[2], a);
    g.strokeWeight(0.7 + lifeRatio * 0.8);
    g.line(pt.x, pt.y, newX, newY);

    pt.x = newX; pt.y = newY; pt.age++;
    if (pt.age > pt.maxAge || newX < 0 || newX > 800 || newY < 0 || newY > 800) {
      let reborn = newParticle(p);
      reborn.humanBias = pt.humanBias;
      Object.assign(pt, reborn);
    }
  }
}

// ── 留痕粒子（永不消亡·对应审计记录） ───────────────────────
function drawAuditParticles(p) {
  if (!shield.auditParticles.length) return;
  let t = p.frameCount * 0.01;
  for (let ap of shield.auditParticles) {
    // 缓慢脉冲
    let pulse = 0.5 + 0.5 * Math.sin(t + ap.phase);
    let a = 40 + 60 * pulse;
    p.noStroke();
    p.fill(255, 215, 0, a); // 金色
    p.ellipse(ap.x, ap.y, 3 + pulse * 2, 3 + pulse * 2);
  }
}

// ── 龍盾脉冲光晕（中心·宝宝P72） ────────────────────────────
let shieldPulsePhase = 0;
function drawShieldPulse(p) {
  if (!shield.connected) return;
  shieldPulsePhase += 0.03;
  let pulse = 0.5 + 0.5 * Math.sin(shieldPulsePhase);
  let r = 195, g2 = 155, b = 211;
  // 中心光晕（宫格5·不动点）
  let cx = 400, cy = 400;
  for (let ring = 3; ring > 0; ring--) {
    let radius = (60 + ring * 20) * (1 + pulse * 0.2);
    let alpha = (15 - ring * 3) * pulse;
    p.noFill();
    p.stroke(r, g2, b, alpha);
    p.strokeWeight(ring === 1 ? 1.5 : 0.5);
    p.ellipse(cx, cy, radius * 2, radius * 2);
  }
  p.noStroke();
  p.fill(r, g2, b, 20 * pulse);
  p.ellipse(cx, cy, 30, 30);
}

// ── 向善四律染色叠层 ─────────────────────────────────────────
function applyEthicsTint(p) {
  let [r, g2, b] = shield.ethicsTint;
  p.noStroke();
  p.fill(r, g2, b, 8);
  p.rect(0, 0, 800, 800);
}

// ── 新增留痕粒子（每次收到新审计记录）────────────────────────
function addAuditParticle(count) {
  let current = shield.auditParticles.length;
  for (let i = current; i < count; i++) {
    shield.auditParticles.push({
      x: 400 + (Math.random() - 0.5) * 600,
      y: 400 + (Math.random() - 0.5) * 600,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

// ═══ :9622 双向同步 ═══════════════════════════════════════════
async function syncWithEngine() {
  try {
    // 1. 健康检查
    const health = await fetch(`${API_BASE}/api/router/health`, {signal: AbortSignal.timeout(2000)})
      .then(r => r.json()).catch(() => null);

    if (!health || health.status !== 'ok') {
      setConnStatus(false);
      return;
    }
    setConnStatus(true);

    // 2. 向善四律状态（如果引擎支持）
    const ethics = await fetch(`${API_BASE}/loShu/ethics_status`, {signal: AbortSignal.timeout(2000)})
      .then(r => r.json()).catch(() => ({status: 'green'}));
    updateEthics(ethics.status);

    // 3. Merkle密度
    const density = await fetch(`${API_BASE}/loShu/merkle_density`, {signal: AbortSignal.timeout(2000)})
      .then(r => r.json()).catch(() => ({value: 0}));
    shield.merkleValue = density.value || 0;
    document.getElementById('sp-density').textContent =
      shield.merkleValue > 0 ? shield.merkleValue.toFixed(3) : '0.000';

    // 4. 审计留痕数量
    const audit = await fetch(`${API_BASE}/loShu/audit_count`, {signal: AbortSignal.timeout(2000)})
      .then(r => r.json()).catch(() => ({count: shield.auditCount}));
    let newCount = audit.count || 0;
    if (newCount > shield.auditCount) {
      addAuditParticle(Math.min(newCount, shield.auditCount + 50)); // 每次最多加50个
    }
    shield.auditCount = newCount;
    document.getElementById('sp-audit').textContent = shield.auditCount;

    // 5. 从德者永生殿读人格调用统计 → 动态调权重
    const personas = await fetch(`${API_BASE}/api/router/personas`, {signal: AbortSignal.timeout(2000)})
      .then(r => r.json()).catch(() => null);
    if (personas) updateOverlay('🛡️ 宝宝P72 · 龍盾守护中 · 已接入:9622');

  } catch(e) {
    setConnStatus(false);
  }
}

function setConnStatus(online) {
  shield.connected = online;
  const el = document.getElementById('sp-conn');
  el.innerHTML = online
    ? '<span class="dot dot-green"></span>在线'
    : '<span class="dot dot-grey"></span>离线';
  updateOverlay(online ? '🛡️ 宝宝P72 · 龍盾守护中 · :9622 已接入' : '🛡️ 宝宝P72 · 龍盾守护中 · 离线模式');
}

function updateEthics(status) {
  shield.ethicsStatus = status;
  const el = document.getElementById('sp-ethics');
  const colorMap = {
    green:  {dot:'dot-green',  text:'🟢 向善四律通过', tint:[74,144,217]},
    orange: {dot:'dot-orange', text:'🟠 P1警告·待确认', tint:[230,126,34]},
    red:    {dot:'dot-red',    text:'🔴 P0熔断', tint:[192,57,43]},
  };
  const cfg = colorMap[status] || colorMap.green;
  el.innerHTML = `<span class="dot ${cfg.dot}"></span>${cfg.text}`;
  shield.ethicsTint = cfg.tint;
  // 更新流场天场颜色
  params.cH = cfg.tint;
}

function updateOverlay(text) {
  const el = document.getElementById('canvas-overlay');
  el.style.display = 'block';
  el.textContent = text;
}

// ═══ 实时路由 ══════════════════════════════════════════════════
async function triggerRoute() {
  const text = document.getElementById('route-input').value.trim();
  if (!text) return;
  const resEl = document.getElementById('route-result');
  resEl.textContent = '⏳ 路由中…';

  if (!shield.connected) {
    // 离线模式：简单关键词匹配
    resEl.textContent = '🛡️ 离线模式 · 宝宝接球 · 宝宝P72·龍盾';
    shield.activePersona = '🌌 宝宝P72·龍盾';
    document.getElementById('sp-persona').textContent = '🌌 宝宝P72';
    return;
  }

  try {
    const resp = await fetch(`${API_BASE}/api/router/route`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text, risk_score: 0.0, update_notion: true}),
      signal: AbortSignal.timeout(5000),
    }).then(r => r.json());

    if (resp.status === 'FUSED') {
      resEl.textContent = `🔴 熔断！触发词: ${resp.trigger}`;
      updateEthics('red');
      shield.auditParticles.push({x:400,y:400,phase:0});
    } else {
      let shortcutTag = resp.shortcut ? '⚡短路' : '';
      resEl.textContent = `✅ ${resp.activated_name} (${resp.score?.toFixed(3)}) ${shortcutTag}`;
      shield.activePersona = resp.activated_name;
      document.getElementById('sp-persona').textContent = resp.activated_name?.slice(0, 12) || '—';
      // 人格激活 → 在中心产生一个脉冲留痕
      shield.auditParticles.push({
        x: 350 + Math.random()*100,
        y: 350 + Math.random()*100,
        phase: Math.random()*Math.PI*2,
      });
    }
  } catch(e) {
    resEl.textContent = `🛡️ 宝宝接球 · ${text.slice(0,15)}…`;
    document.getElementById('sp-persona').textContent = '🌌 宝宝P72';
  }
}

// Enter键触发路由
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('route-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); triggerRoute(); }
  });
});

// ═══ UI工具函数 ════════════════════════════════════════════════
function updateWeights() {
  let h=+document.getElementById('wH').value;
  let e=+document.getElementById('wE').value;
  let pp=+document.getElementById('wP').value;
  let total=h+e+pp;
  params.wH=Math.round(h/total*100);
  params.wE=Math.round(e/total*100);
  params.wP=100-params.wH-params.wE;
  ['wHVal','wEVal','wPVal'].forEach((id,i)=>{
    document.getElementById(id).textContent=[params.wH,params.wE,params.wP][i]+'%';
  });
  ['wHSlider','wESlider','wPSlider'].forEach((id,i)=>{
    document.getElementById(id).textContent=[params.wH,params.wE,params.wP][i];
  });
  document.getElementById('barH').style.flex=params.wH;
  document.getElementById('barE').style.flex=params.wE;
  document.getElementById('barP').style.flex=params.wP;
}

function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function updateColors(){
  params.cH=hexToRgb(document.getElementById('cH').value);
  params.cE=hexToRgb(document.getElementById('cE').value);
  params.cP=hexToRgb(document.getElementById('cP').value);
  params.cBg=hexToRgb(document.getElementById('cBg').value);
}

function prevSeed(){params.seed=Math.max(1,params.seed-1);applySeed();}
function nextSeed(){params.seed+=1;applySeed();}
function randomSeed(){params.seed=Math.floor(Math.random()*99999)+1;applySeed();}
function jumpSeed(){params.seed=parseInt(document.getElementById('seedInput').value)||9622;applySeed();}
function applySeed(){
  document.getElementById('seedDisplay').textContent=params.seed;
  document.getElementById('seedInput').value=params.seed;
  restartSketch();
}

function restartSketch(){if(myp5)myp5.remove();myp5=new p5(sketch);}

function resetAll(){
  params={seed:9622,numP:2000,nFreq:0.003,step:1.8,life:120,alpha:18,
    wH:35,wE:15,wP:50,cH:[74,144,217],cE:[124,184,124],cP:[195,155,211],cBg:[10,10,15]};
  document.getElementById('wH').value=35;
  document.getElementById('wE').value=15;
  document.getElementById('wP').value=50;
  document.getElementById('nFreq').value=3;
  document.getElementById('step').value=18;
  document.getElementById('life').value=120;
  document.getElementById('alpha').value=18;
  document.getElementById('numP').value=2000;
  document.getElementById('cH').value='#4a90d9';
  document.getElementById('cE').value='#7cb87c';
  document.getElementById('cP').value='#c39bd3';
  document.getElementById('cBg').value='#0a0a0f';
  shield.auditParticles=[];
  updateWeights();
  applySeed();
}

function downloadPNG(){if(myp5)myp5.saveCanvas('三才流場_v4_seed'+params.seed+'_UID9622','png');}

// 参数滑块绑定
document.getElementById('nFreq').oninput=function(){params.nFreq=this.value/1000;document.getElementById('nFreqVal').textContent=params.nFreq.toFixed(3);};
document.getElementById('step').oninput=function(){params.step=this.value/10;document.getElementById('stepVal').textContent=params.step.toFixed(1);};
document.getElementById('life').oninput=function(){params.life=+this.value;document.getElementById('lifeVal').textContent=this.value;};
document.getElementById('alpha').oninput=function(){params.alpha=+this.value;document.getElementById('alphaVal').textContent=this.value;};
document.getElementById('numP').oninput=function(){params.numP=+this.value;document.getElementById('numPVal').textContent=this.value;restartSketch();};

// ═══ 启动 ══════════════════════════════════════════════════════
myp5 = new p5(sketch);
updateOverlay('🛡️ 宝宝P72 · 龍盾守护中');

// 首次同步 + 定时60秒同步
syncWithEngine();
setInterval(syncWithEngine, 60000);
</script>
