<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 龍魂量子纠缠式双重认证 - 演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #E63946 0%, #c41e29 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .auth-step {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #ccc;
            transition: all 0.3s;
        }
        
        .auth-step.active {
            border-left-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .auth-step.success {
            border-left-color: #06D6A0;
            background: rgba(6, 214, 160, 0.05);
        }
        
        .auth-step.failed {
            border-left-color: #EF476F;
            background: rgba(239, 71, 111, 0.05);
        }
        
        .step-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .step-title {
            font-size: 18px;
            font-weight: bold;
        }
        
        .step-content {
            padding-left: 55px;
        }
        
        .quantum-key {
            background: #1e1e1e;
            color: #06D6A0;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            margin: 10px 0;
            word-break: break-all;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
            text-decoration: none;
            margin: 5px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #06D6A0;
            color: white;
        }
        
        .btn-success:hover {
            background: #04c794;
        }
        
        .btn-danger {
            background: #EF476F;
            color: white;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .badge-pending {
            background: #f0f0f0;
            color: #666;
        }
        
        .badge-success {
            background: rgba(6, 214, 160, 0.2);
            color: #06D6A0;
        }
        
        .badge-failed {
            background: rgba(239, 71, 111, 0.2);
            color: #EF476F;
        }
        
        .verification-result {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            margin-top: 20px;
        }
        
        .result-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .result-message {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .result-details {
            color: #666;
            margin-top: 15px;
        }
        
        .info-box {
            background: rgba(102, 126, 234, 0.1);
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        
        .info-box strong {
            color: #667eea;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 龍魂量子纠缠式双重认证</h1>
            <div class="subtitle">DNA追溯码：#龍芯⚡️2026-02-02-量子纠缠认证-演示-v1.0</div>
        </div>
        
        <div class="content">
            <!-- 步骤1：量子密钥生成 -->
            <div class="auth-step" id="step1">
                <div class="step-header">
                    <div class="step-number">1</div>
                    <div class="step-title">
                        ⚛️ 量子纠缠密钥对生成
                        <span class="status-badge badge-pending" id="status1">待启动</span>
                    </div>
                </div>
                <div class="step-content">
                    <p>生成用户持有（Key A）和系统持有（Key B）的纠缠密钥对</p>
                    <div class="quantum-key" id="keyDisplay" style="display:none;">
                        Key A（用户）: <span id="keyA"></span><br>
                        Key B（系统）: <span id="keyB"></span><br>
                        DNA追溯码: <span id="dnaCode"></span>
                    </div>
                    <button class="btn btn-primary" onclick="generateKeys()">生成密钥对</button>
                </div>
            </div>
            
            <!-- 步骤2：华为账号认证 -->
            <div class="auth-step" id="step2">
                <div class="step-header">
                    <div class="step-number">2</div>
                    <div class="step-title">
                        📱 华为账号认证
                        <span class="status-badge badge-pending" id="status2">待认证</span>
                    </div>
                </div>
                <div class="step-content">
                    <p>通过华为OAuth进行身份验证</p>
                    <div class="info-box" style="display:none;" id="huaweiInfo">
                        <strong>用户信息：</strong><br>
                        用户ID: <span id="huaweiUserId"></span><br>
                        Token过期时间: <span id="huaweiExpire"></span>
                    </div>
                    <button class="btn btn-primary" onclick="authHuawei()" id="btnHuawei" disabled>授权华为账号</button>
                </div>
            </div>
            
            <!-- 步骤3：微信认证 -->
            <div class="auth-step" id="step3">
                <div class="step-header">
                    <div class="step-number">3</div>
                    <div class="step-title">
                        💬 微信认证
                        <span class="status-badge badge-pending" id="status3">待认证</span>
                    </div>
                </div>
                <div class="step-content">
                    <p>通过微信OAuth进行身份验证</p>
                    <div class="info-box" style="display:none;" id="wechatInfo">
                        <strong>用户信息：</strong><br>
                        用户ID: <span id="wechatUserId"></span><br>
                        Token过期时间: <span id="wechatExpire"></span>
                    </div>
                    <button class="btn btn-primary" onclick="authWechat()" id="btnWechat" disabled>授权微信</button>
                </div>
            </div>
            
            <!-- 步骤4：双重验证 -->
            <div class="auth-step" id="step4">
                <div class="step-header">
                    <div class="step-number">4</div>
                    <div class="step-title">
                        🔐 双重验证
                        <span class="status-badge badge-pending" id="status4">待验证</span>
                    </div>
                </div>
                <div class="step-content">
                    <p>验证华为账号 + 微信 + 量子密钥</p>
                    <button class="btn btn-success" onclick="verify()" id="btnVerify" disabled>开始验证</button>
                    <button class="btn btn-danger" onclick="verifyWithFakeKey()">使用错误密钥（测试防窃听）</button>
                </div>
            </div>
            
            <!-- 验证结果 -->
            <div class="verification-result" id="result" style="display:none;">
                <div class="result-icon" id="resultIcon"></div>
                <div class="result-message" id="resultMessage"></div>
                <div class="result-details" id="resultDetails"></div>
                <button class="btn btn-primary" onclick="reset()" style="margin-top:20px;">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        let sessionData = {
            keyA: null,
            keyB: null,
            huaweiAuthed: false,
            wechatAuthed: false
        };

        function generateKeys() {
            // 模拟生成量子纠缠密钥对
            const keyA = generateRandomKey();
            const keyB = generateRandomKey();
            const dnaCode = `#龍芯⚡️${new Date().toISOString().split('T')[0]}-量子纠缠密钥-UID9622`;
            
            sessionData.keyA = keyA;
            sessionData.keyB = keyB;
            
            document.getElementById('keyA').textContent = keyA;
            document.getElementById('keyB').textContent = keyB;
            document.getElementById('dnaCode').textContent = dnaCode;
            document.getElementById('keyDisplay').style.display = 'block';
            
            updateStepStatus('step1', 'status1', 'success', '已生成');
            document.getElementById('btnHuawei').disabled = false;
            document.getElementById('btnWechat').disabled = false;
        }

        function authHuawei() {
            document.getElementById('btnHuawei').textContent = '认证中...';
            document.getElementById('btnHuawei').disabled = true;
            
            setTimeout(() => {
                // 模拟OAuth认证成功
                const userId = 'huawei_' + Math.random().toString(36).substr(2, 9);
                const expireTime = new Date(Date.now() + 2*60*60*1000).toLocaleString();
                
                document.getElementById('huaweiUserId').textContent = userId;
                document.getElementById('huaweiExpire').textContent = expireTime;
                document.getElementById('huaweiInfo').style.display = 'block';
                
                sessionData.huaweiAuthed = true;
                updateStepStatus('step2', 'status2', 'success', '已认证');
                
                checkReadyToVerify();
            }, 1000);
        }

        function authWechat() {
            document.getElementById('btnWechat').textContent = '认证中...';
            document.getElementById('btnWechat').disabled = true;
            
            setTimeout(() => {
                // 模拟OAuth认证成功
                const userId = 'wechat_' + Math.random().toString(36).substr(2, 9);
                const expireTime = new Date(Date.now() + 2*60*60*1000).toLocaleString();
                
                document.getElementById('wechatUserId').textContent = userId;
                document.getElementById('wechatExpire').textContent = expireTime;
                document.getElementById('wechatInfo').style.display = 'block';
                
                sessionData.wechatAuthed = true;
                updateStepStatus('step3', 'status3', 'success', '已认证');
                
                checkReadyToVerify();
            }, 1000);
        }

        function checkReadyToVerify() {
            if (sessionData.huaweiAuthed && sessionData.wechatAuthed) {
                document.getElementById('btnVerify').disabled = false;
            }
        }

        function verify() {
            verifyInternal(sessionData.keyA);
        }

        function verifyWithFakeKey() {
            verifyInternal('FAKE_KEY_TAMPERED');
        }

        function verifyInternal(userKey) {
            document.getElementById('btnVerify').disabled = true;
            
            setTimeout(() => {
                const huaweiOk = sessionData.huaweiAuthed;
                const wechatOk = sessionData.wechatAuthed;
                const quantumOk = (userKey === sessionData.keyA);
                const success = huaweiOk && wechatOk && quantumOk;
                
                if (success) {
                    showResult(true, '✅ 双重认证成功！', 
                        '华为账号、微信、量子密钥全部验证通过！<br>您已获得系统访问权限。');
                    updateStepStatus('step4', 'status4', 'success', '验证通过');
                } else {
                    const reasons = [];
                    if (!huaweiOk) reasons.push('华为账号');
                    if (!wechatOk) reasons.push('微信');
                    if (!quantumOk) reasons.push('量子密钥被篡改');
                    
                    showResult(false, '❌ 双重认证失败！', 
                        `失败原因：${reasons.join(', ')}<br>🚨 检测到可能的安全威胁！`);
                    updateStepStatus('step4', 'status4', 'failed', '验证失败');
                }
            }, 1500);
        }

        function updateStepStatus(stepId, statusId, type, text) {
            const step = document.getElementById(stepId);
            const status = document.getElementById(statusId);
            
            step.classList.remove('active', 'success', 'failed');
            status.classList.remove('badge-pending', 'badge-success', 'badge-failed');
            
            if (type === 'success') {
                step.classList.add('success');
                status.classList.add('badge-success');
            } else if (type === 'failed') {
                step.classList.add('failed');
                status.classList.add('badge-failed');
            }
            
            status.textContent = text;
        }

        function showResult(success, message, details) {
            document.getElementById('result').style.display = 'block';
            document.getElementById('resultIcon').textContent = success ? '✅' : '❌';
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('resultDetails').innerHTML = details;
            
            // 滚动到结果
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }

        function reset() {
            location.reload();
        }

        function generateRandomKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
            let key = '';
            for (let i = 0; i < 43; i++) {
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return key;
        }
    </script>
</body>
</html>
