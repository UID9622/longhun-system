<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #f8f6f0 0%, #ede8df 50%, #f0ece3 100%);

    /* Canvas */

    #canvas-container canvas {

<body>

<div class="status-bar">
  <div>帧率 <span id="fps-display">—</span> fps</div>
  <div>粒子 <span id="alive-display">—</span> 活跃</div>
  <div>帧数 <span id="frame-display">—</span></div>
  <div>种子 <span id="seed-status">9622</span></div>
</div>

<script>
// ============================================================
//  三才流場 · San Cai Flow Field
//  天地人三才算法 + Perlin噪声流场 + 洛书地格 + 种子确定性
//  DNA: #龍芯⚡️2026-03-27-三才流場-v1.0 · UID9622
// ============================================================

const CANVAS_SIZE = 800;

let params = {
  seed:        9622,
  particles:   3000,
  noiseScale:  0.003,
  stepSize:    2.5,
  lifespan:    180,
  timeSpeed:   0.0008,
  earthForce:  0.15,
  trailAlpha:  18,
  wHeaven:     0.35,
  wEarth:      0.15,
  // wHuman = 1 - wHeaven - wEarth (always)
  colHeaven:   [74, 143, 223],
  colEarth:    [92, 184, 122],
  colHuman:    [224, 112, 80],
  colBg:       [10, 10, 18],
};

let particles = [];
let t = 0;
let earthGrid = [];   // 洛书地格锚点
let fpsHistory = [];

// ---- Seeded LCG PRNG (deterministic, not p5 noise) ----
function makeRng(seed) {
  let s = seed >>> 0;
  return function() {
    s = (Math.imul(1664525, s) + 1013904223) >>> 0;
    return s / 4294967296;
  };
}

// ---- Hex to RGB ----
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

// ---- Build Earth Grid (Luoshu 9×9) ----
function buildEarthGrid(rng) {
  earthGrid = [];
  const rows = 9, cols = 9;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // Luoshu polarity: odd positions attract, even repel
      const polarity = ((r + c) % 2 === 0) ? 1 : -1;
      earthGrid.push({
        x: (c + 0.5) / cols * CANVAS_SIZE,
        y: (r + 0.5) / rows * CANVAS_SIZE,
        polarity,
        strength: 0.3 + rng() * 0.7,
      });
    }
  }
}

// ---- Compute earth field angle at (x, y) ----
function earthAngle(x, y) {
  let ax = 0, ay = 0;
  for (const pt of earthGrid) {
    const dx = pt.x - x;
    const dy = pt.y - y;
    const dist2 = dx * dx + dy * dy + 100;
    const force = pt.polarity * pt.strength * params.earthForce * 800 / dist2;
    ax += force * dx;
    ay += force * dy;
  }
  return Math.atan2(ay, ax);
}

// ---- Particle class ----
class Particle {
  constructor(rng) {
    this.reset(rng);
  }
  reset(rng) {
    this.x  = rng() * CANVAS_SIZE;
    this.y  = rng() * CANVAS_SIZE;
    this.px = this.x;
    this.py = this.y;
    this.age = Math.floor(rng() * params.lifespan);  // stagger birth
    this.maxAge = params.lifespan + Math.floor(rng() * params.lifespan * 0.5);
    this.hueOffset = rng() * 60 - 30;   // human hue variation
    this.speed = 0.6 + rng() * 0.8;
  }
}

// ============================================================
//  p5.js Sketch
// ============================================================
new p5(function(p) {

  let rng;

  function init() {
    rng = makeRng(params.seed);
    p.randomSeed(params.seed);
    p.noiseSeed(params.seed);
    buildEarthGrid(rng);

    // Respawn all particles deterministically
    rng = makeRng(params.seed ^ 0xDEADBEEF);
    particles = [];
    for (let i = 0; i < params.particles; i++) {
      particles.push(new Particle(rng));
    }

    t = 0;
    const bg = params.colBg;
    p.background(bg[0], bg[1], bg[2]);
  }

  p.setup = function() {
    const cnv = p.createCanvas(CANVAS_SIZE, CANVAS_SIZE);
    cnv.parent('canvas-container');
    p.colorMode(p.RGB, 255);
    p.strokeWeight(1.0);
    p.noFill();
    init();
  };

  p.draw = function() {
    // Fade background each frame (trail effect)
    const bg = params.colBg;
    p.fill(bg[0], bg[1], bg[2], params.trailAlpha);
    p.noStroke();
    p.rect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    const wH = params.wHeaven;
    const wE = params.wEarth;
    const wP = 1.0 - wH - wE;   // human weight is remainder

    let alive = 0;

    for (let i = 0; i < particles.length; i++) {
      const pt = particles[i];
      pt.age++;

      if (pt.age > pt.maxAge) {
        // Respawn deterministically using current frame as extra entropy
        const localRng = makeRng(params.seed ^ (i * 7919) ^ (p.frameCount));
        pt.reset(localRng);
        continue;
      }

      // ---- 天场：Perlin噪声矢量 ----
      const nx = pt.x * params.noiseScale;
      const ny = pt.y * params.noiseScale;
      const heavenAngle = p.noise(nx, ny, t) * p.TWO_PI * 4.0;

      // ---- 地场：洛书引力 ----
      const eAngle = earthAngle(pt.x, pt.y);

      // ---- 人场：种子偏置旋转 ----
      const seedBias = (params.seed % 360) / 360 * p.TWO_PI;
      const humanAngle = heavenAngle + seedBias + Math.sin(pt.age * 0.04) * 0.8;

      // ---- 三才合力 ----
      // Circular mean via vector sum
      const ax = wH * Math.cos(heavenAngle) + wE * Math.cos(eAngle) + wP * Math.cos(humanAngle);
      const ay = wH * Math.sin(heavenAngle) + wE * Math.sin(eAngle) + wP * Math.sin(humanAngle);
      const finalAngle = Math.atan2(ay, ax);

      const step = params.stepSize * pt.speed;
      pt.px = pt.x;
      pt.py = pt.y;
      pt.x += Math.cos(finalAngle) * step;
      pt.y += Math.sin(finalAngle) * step;

      // Wrap boundaries
      if (pt.x < 0) pt.x = CANVAS_SIZE;
      if (pt.x > CANVAS_SIZE) pt.x = 0;
      if (pt.y < 0) pt.y = CANVAS_SIZE;
      if (pt.y > CANVAS_SIZE) pt.y = 0;

      // ---- 颜色：三才权重混合 ----
      const life = 1 - pt.age / pt.maxAge;
      const alpha = Math.floor(life * 200 + 30);

      const r = Math.floor(wH * params.colHeaven[0] + wE * params.colEarth[0] + wP * params.colHuman[0]);
      const g = Math.floor(wH * params.colHeaven[1] + wE * params.colEarth[1] + wP * params.colHuman[1]);
      const b = Math.floor(wH * params.colHeaven[2] + wE * params.colEarth[2] + wP * params.colHuman[2]);

      // Age-based hue shift
      const shift = Math.sin(pt.age * 0.02 + pt.hueOffset) * 40;
      const cr = Math.min(255, Math.max(0, r + shift));
      const cg = Math.min(255, Math.max(0, g));
      const cb = Math.min(255, Math.max(0, b - shift * 0.5));

      p.stroke(cr, cg, cb, alpha);
      p.line(pt.px, pt.py, pt.x, pt.y);
      alive++;
    }

    t += params.timeSpeed;

    // Status updates (throttled)
    if (p.frameCount % 20 === 0) {
      fpsHistory.push(Math.round(p.frameRate()));
      if (fpsHistory.length > 5) fpsHistory.shift();
      const fps = Math.round(fpsHistory.reduce((a,b)=>a+b,0)/fpsHistory.length);
      document.getElementById('fps-display').textContent = fps;
      document.getElementById('alive-display').textContent = alive;
      document.getElementById('frame-display').textContent = p.frameCount;
    }
  };

  // Expose for UI
  window._p5 = p;
  window._init = init;

}, 'canvas-container');

// ============================================================
//  UI Handlers
// ============================================================

function updateParam(key, val, labelId) {
  params[key] = val;
  if (labelId) document.getElementById(labelId).textContent = val;
  updateSliderFill(document.getElementById(key));
}

function updateWeights(key, val) {
  params[key] = val;
  document.getElementById(key + '-val').textContent = val.toFixed(2);
  updateSliderFill(document.getElementById(key));

  // wHuman = 1 - wH - wE (clamp to 0)
  const wP = Math.max(0, 1 - params.wHeaven - params.wEarth);
  const wPct = Math.round(wP * 100);
  const wHPct = Math.round(params.wHeaven * 100);
  const wEPct = Math.round(params.wEarth * 100);

  document.getElementById('wh-bar').style.width = wHPct + '%';
  document.getElementById('we-bar').style.width = wEPct + '%';
  document.getElementById('wp-bar').style.width = wPct + '%';
  document.getElementById('wh-val').textContent = params.wHeaven.toFixed(2);
  document.getElementById('we-val').textContent = params.wEarth.toFixed(2);
  document.getElementById('wp-val').textContent = wP.toFixed(2);
  document.getElementById('wHeaven-val').textContent = params.wHeaven.toFixed(2);
  document.getElementById('wEarth-val').textContent = params.wEarth.toFixed(2);
}

function updateColor() {
  params.colHeaven = hexToRgb(document.getElementById('col-heaven').value);
  params.colEarth  = hexToRgb(document.getElementById('col-earth').value);
  params.colHuman  = hexToRgb(document.getElementById('col-human').value);
  params.colBg     = hexToRgb(document.getElementById('col-bg').value);
}

function updateSliderFill(el) {
  if (!el) return;
  const pct = (el.value - el.min) / (el.max - el.min) * 100;
  el.style.setProperty('--fill', pct + '%');
}

function setSeed(s) {
  params.seed = Math.max(1, Math.min(99999, Math.floor(s)));
  document.getElementById('seed-display').textContent = params.seed;
  document.getElementById('seed-status').textContent = params.seed;
  document.getElementById('seed-input').value = '';
  regenerate();
}

function changeSeed(delta) { setSeed(params.seed + delta); }
function randomSeedFn()    { setSeed(Math.floor(Math.random() * 99999) + 1); }
function jumpSeed() {
  const v = parseInt(document.getElementById('seed-input').value);
  if (!isNaN(v)) setSeed(v);
}

function regenerate() {
  if (window._init) window._init();
}

function resetDefaults() {
  const defaults = {
    particles: 3000, noiseScale: 0.003, stepSize: 2.5,
    lifespan: 180, timeSpeed: 0.0008, earthForce: 0.15,
    trailAlpha: 18, wHeaven: 0.35, wEarth: 0.15
  };
  for (const [k, v] of Object.entries(defaults)) {
    params[k] = v;
    const el = document.getElementById(k);
    if (el) { el.value = v; updateSliderFill(el); }
    const lbl = document.getElementById(k + '-val');
    if (lbl) lbl.textContent = v;
  }
  document.getElementById('wHeaven-val').textContent = '0.35';
  document.getElementById('wEarth-val').textContent = '0.15';
  updateWeights('wHeaven', 0.35);
  regenerate();
}

function downloadPNG() {
  if (window._p5) window._p5.saveCanvas('三才流場_seed' + params.seed, 'png');
}

// Init slider fills
document.querySelectorAll('input[type=range]').forEach(updateSliderFill);

</script>
</body>
</html>
