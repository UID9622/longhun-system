<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三才流場 · San Cai Flow Field</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Anthropic Brand Colors */
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 22px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 6px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 12px;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .control-section { margin-bottom: 28px; }

        .control-section h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        /* Seed */
        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
            color: var(--anthropic-dark);
        }
        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        /* Parameters */
        .control-group { margin-bottom: 18px; }

        .control-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 7px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: #c86641;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 52px;
            text-align: right;
        }

        /* Weights bar */
        .weight-bars { margin-bottom: 14px; }
        .w-row {
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: var(--anthropic-mid-gray);
            margin-bottom: 6px;
        }
        .w-label { width: 30px; font-weight: 500; color: var(--anthropic-dark); }
        .w-track { flex: 1; height: 6px; background: var(--anthropic-light-gray); border-radius: 3px; overflow: hidden; }
        .w-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .w-heaven { background: var(--anthropic-blue); }
        .w-earth  { background: var(--anthropic-green); }
        .w-human  { background: var(--anthropic-orange); }
        .w-num { width: 34px; text-align: right; font-family: 'Courier New', monospace; font-size: 11px; }

        /* Colors */
        .color-group { margin-bottom: 12px; }
        .color-group label {
            display: block; font-size: 12px;
            color: var(--anthropic-mid-gray); margin-bottom: 4px;
        }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] {
            width: 32px; height: 30px;
            border: none; border-radius: 6px;
            cursor: pointer; background: none; padding: 0;
        }
        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px; color: var(--anthropic-mid-gray);
        }

        /* Buttons */
        .button {
            background: var(--anthropic-orange);
            color: white; border: none;
            padding: 10px 16px; border-radius: 6px;
            font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            width: 100%;
        }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }

        /* Canvas */
        .canvas-area {
            flex: 1; display: flex;
            align-items: center; justify-content: center; min-width: 0;
        }

        #canvas-container {
            width: 100%; max-width: 900px;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(20,20,19,0.12);
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .dna-tag {
            font-size: 10px; color: var(--anthropic-mid-gray);
            font-family: 'Courier New', monospace;
            margin-top: 20px; padding-top: 12px;
            border-top: 1px solid var(--anthropic-light-gray);
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ═══ SIDEBAR ═══ -->
    <div class="sidebar">
        <h1>三才流場</h1>
        <div class="subtitle">
            San Cai Flow Field · 天地人三才算法<br>
            粒子流场生成艺术 · UID9622
        </div>

        <!-- SEED (FIXED) -->
        <div class="control-section">
            <h3>Seed · 种子</h3>
            <input type="number" id="seed-input" class="seed-input" value="9622" onchange="updateSeed()">
            <div class="seed-controls">
                <button class="button secondary" onclick="previousSeed()">← 上一</button>
                <button class="button secondary" onclick="nextSeed()">下一 →</button>
            </div>
            <button class="button tertiary" onclick="randomSeedAndUpdate()" style="margin-bottom:0">↻ 随机种子</button>
        </div>

        <!-- PARAMETERS (VARIABLE) -->
        <div class="control-section">
            <h3>Parameters · 参数</h3>

            <div class="control-group">
                <label>粒子数量 Particles</label>
                <div class="slider-container">

            <div class="control-group">

            </div>

            <div class="control-group">
                <label>时间演化 Time Flow</label>
                <div class="slider-container">
                    <input type="range" id="timeSpeed" min="0.0001" max="0.003" step="0.0001" value="0.0008"
                        oninput="updateParam('timeSpeed', +this.value, 'timeSpeed-value')">
                    <span class="value-display" id="timeSpeed-value">0.0008</span>
                </div>
            </div>

            <div class="control-group">
                <label>地场强度 Earth Force</label>
                <div class="slider-container">
                    <input type="range" id="earthForce" min="0" max="0.5" step="0.01" value="0.15"
                        oninput="updateParam('earthForce', +this.value, 'earthForce-value')">
                    <span class="value-display" id="earthForce-value">0.15</span>
                </div>
            </div>

            <div class="control-group">
                <label>轨迹余辉 Trail</label>
                <div class="slider-container">
                    <input type="range" id="trailAlpha" min="5" max="60" step="1" value="15"
                        oninput="updateParam('trailAlpha', +this.value, 'trailAlpha-value')">
                    <span class="value-display" id="trailAlpha-value">15</span>
                </div>
            </div>
        </div>

        <!-- THREE TALENTS WEIGHTS -->
        <div class="control-section">
            <h3>三才权重 · Weights</h3>
            <div class="weight-bars">
                <div class="w-row">
                    <span class="w-label">☰ 天</span>
                    <div class="w-track"><div class="w-fill w-heaven" id="bar-heaven" style="width:35%"></div></div>
                    <span class="w-num" id="num-heaven">0.35</span>
                </div>
                <div class="w-row">
                    <span class="w-label">☷ 地</span>
                    <div class="w-track"><div class="w-fill w-earth" id="bar-earth" style="width:15%"></div></div>
                    <span class="w-num" id="num-earth">0.15</span>
                </div>
                <div class="w-row">
                    <span class="w-label">☱ 人</span>
                    <div class="w-track"><div class="w-fill w-human" id="bar-human" style="width:50%"></div></div>
                    <span class="w-num" id="num-human">0.50</span>
                </div>
            </div>

            <div class="control-group">
                <label>天场权重 Heaven</label>
                <div class="slider-container">
                    <input type="range" id="wHeaven" min="0.05" max="0.75" step="0.01" value="0.35"
                        oninput="updateWeights('wHeaven', +this.value)">
                    <span class="value-display" id="wHeaven-value">0.35</span>
                </div>
            </div>
            <div class="control-group">
                <label>地场权重 Earth</label>
                <div class="slider-container">
                    <input type="range" id="wEarth" min="0" max="0.5" step="0.01" value="0.15"
                        oninput="updateWeights('wEarth', +this.value)">
                    <span class="value-display" id="wEarth-value">0.15</span>
                </div>
            </div>
        </div>

        <!-- COLORS -->
        <div class="control-section">
            <h3>Colors · 色彩</h3>
            <div class="color-group">
                <label>☰ 天 Heaven</label>
                <div class="color-picker-container">
                    <input type="color" id="color-heaven" value="#6a9bcc" onchange="updateColor()">
                    <span class="color-value" id="color-heaven-hex">#6a9bcc</span>
                </div>
            </div>
            <div class="color-group">
                <label>☷ 地 Earth</label>
                <div class="color-picker-container">
                    <input type="color" id="color-earth" value="#788c5d" onchange="updateColor()">
                    <span class="color-value" id="color-earth-hex">#788c5d</span>
                </div>
            </div>
            <div class="color-group">
                <label>☱ 人 Human</label>
                <div class="color-picker-container">
                    <input type="color" id="color-human" value="#d97757" onchange="updateColor()">
                    <span class="color-value" id="color-human-hex">#d97757</span>
                </div>
            </div>
            <div class="color-group">
                <label>背景 Background</label>
                <div class="color-picker-container">
                    <input type="color" id="color-bg" value="#0a0a12" onchange="updateColor()">
                    <span class="color-value" id="color-bg-hex">#0a0a12</span>
                </div>
            </div>
        </div>

        <!-- ACTIONS (FIXED) -->
        <div class="control-section">
            <h3>Actions · 操作</h3>
            <div class="button-row" style="margin-bottom:8px">
                <button class="button" onclick="regenerate()">⟳ 重新生成</button>
                <button class="button secondary" onclick="resetParameters()">↺ 重置</button>
            </div>
            <button class="button tertiary" onclick="exportImage()">⬇ 下载 PNG</button>
        </div>

        <div class="dna-tag">
            DNA: #龍芯⚡️2026-03-27-三才流場-v2.0<br>
            创作者: 诸葛鑫 · UID9622<br>
            理论指导: 曾仕强老师
        </div>
    </div>

    <!-- ═══ CANVAS ═══ -->
    <div class="canvas-area">
        <div id="canvas-container"></div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  三才流場 · San Cai Flow Field Algorithm
//  Philosophy: 天地人三力合一，粒子即证，轨迹即道
//  DNA: #龍芯⚡️2026-03-27-三才流場-v2.0 · UID9622
// ═══════════════════════════════════════════════════════════════════

let params = {
    seed:          9622,
    particleCount: 4000,
    noiseScale:    0.003,
    stepSize:      2.5,
    lifespan:      200,
    timeSpeed:     0.0008,
    earthForce:    0.15,
    trailAlpha:    15,
    wHeaven:       0.35,
    wEarth:        0.15,
    colorPalette: ['#6a9bcc', '#788c5d', '#d97757'],  // heaven, earth, human
    bgColor:       '#0a0a12'
};

const defaultParams = JSON.parse(JSON.stringify(params));

// ─── Seeded LCG PRNG (deterministic, independent from p5 noise) ───
function makeLCG(seed) {
    let s = seed >>> 0;
    return () => { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s / 4294967296; };
}

function hexToArr(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

// ─── Earth Grid: Luoshu 9×9 anchor points ───
let earthGrid = [];
function buildEarthGrid(rng) {
    earthGrid = [];
    for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
            earthGrid.push({
                x: (c + 0.5) / 9 * width,
                y: (r + 0.5) / 9 * height,
                pol: ((r + c) % 2 === 0) ? 1 : -1,
                str: 0.3 + rng() * 0.7
            });
        }
    }
}

function earthAngle(x, y) {
    let ax = 0, ay = 0;
    for (const pt of earthGrid) {
        const dx = pt.x - x, dy = pt.y - y;
        const f = pt.pol * pt.str * params.earthForce * 900 / (dx*dx + dy*dy + 100);
        ax += f * dx; ay += f * dy;
    }
    return Math.atan2(ay, ax);
}

// ─── Particle ───
let particles = [];
class Particle {
    constructor(rng, offset = 0) {
        this.rng = rng;
        this.spawn(offset);
    }
    spawn(ageOffset = 0) {
        this.x  = this.rng() * width;
        this.y  = this.rng() * height;
        this.px = this.x; this.py = this.y;
        this.age    = Math.floor(this.rng() * params.lifespan * ageOffset);
        this.maxAge = params.lifespan + Math.floor(this.rng() * params.lifespan * 0.6);
        this.spd    = 0.5 + this.rng() * 1.0;
        this.hShift = this.rng() * 50 - 25;
    }
    step(t, wH, wE, wP, cols) {
        this.age++;
        if (this.age > this.maxAge) { this.spawn(0); return null; }

        // 天 Heaven: Perlin noise
        const ha = noise(this.x * params.noiseScale, this.y * params.noiseScale, t) * TWO_PI * 4;
        // 地 Earth: Luoshu gravity
        const ea = earthAngle(this.x, this.y);
        // 人 Human: seed bias + harmonic
        const bias = (params.seed % 360) / 360 * TWO_PI;
        const pa = ha + bias + Math.sin(this.age * 0.035) * 0.9;

        // 三才合力
        const ax = wH*Math.cos(ha) + wE*Math.cos(ea) + wP*Math.cos(pa);
        const ay = wH*Math.sin(ha) + wE*Math.sin(ea) + wP*Math.sin(pa);
        const angle = Math.atan2(ay, ax);

        this.px = this.x; this.py = this.y;
        this.x += Math.cos(angle) * params.stepSize * this.spd;
        this.y += Math.sin(angle) * params.stepSize * this.spd;

        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;

        const life = 1 - this.age / this.maxAge;
        return { px: this.px, py: this.py, x: this.x, y: this.y, life, hShift: this.hShift };
    }
}

// ─── p5 lifecycle ───
let t = 0;

function initializeSystem() {
    randomSeed(params.seed);
    noiseSeed(params.seed);

    const rng0 = makeLCG(params.seed);
    buildEarthGrid(rng0);

    particles = [];
    const rng1 = makeLCG(params.seed ^ 0xBEEFCAFE);
    for (let i = 0; i < params.particleCount; i++) {
        particles.push(new Particle(makeLCG((params.seed ^ (i * 6271)) >>> 0), 0.8));
    }

    t = 0;
    const bg = hexToArr(params.bgColor);
    background(bg[0], bg[1], bg[2]);
}

function setup() {
    const cnv = createCanvas(900, 900);
    cnv.parent('canvas-container');
    colorMode(RGB, 255);
    strokeWeight(1.0);
    noFill();
    initializeSystem();
}

function draw() {
    // Trail fade
    const bg = hexToArr(params.bgColor);
    fill(bg[0], bg[1], bg[2], params.trailAlpha);
    noStroke();
    rect(0, 0, width, height);

    const wH = params.wHeaven;
    const wE = params.wEarth;
    const wP = Math.max(0, 1 - wH - wE);

    const cH = hexToArr(params.colorPalette[0]);
    const cE = hexToArr(params.colorPalette[1]);
    const cP = hexToArr(params.colorPalette[2]);

    for (const pt of particles) {
        const r = pt.step(t, wH, wE, wP);
        if (!r) continue;

        const alpha = Math.floor(r.life * 200 + 35);
        const shift = Math.sin(pt.age * 0.025 + pt.hShift * 0.04) * 35;

        const cr = Math.min(255, Math.max(0, Math.floor(wH*cH[0] + wE*cE[0] + wP*cP[0]) + shift));
        const cg = Math.min(255, Math.max(0, Math.floor(wH*cH[1] + wE*cE[1] + wP*cP[1])));
        const cb = Math.min(255, Math.max(0, Math.floor(wH*cH[2] + wE*cE[2] + wP*cP[2]) - shift * 0.5));

        stroke(cr, cg, cb, alpha);
        line(r.px, r.py, r.x, r.y);
    }

    t += params.timeSpeed;
}

// ═══ UI Handlers ═══

function updateParam(key, val, lblId) {
    params[key] = val;
    if (lblId) document.getElementById(lblId).textContent = val;
}

function updateWeights(key, val) {
    params[key] = val;
    document.getElementById(key + '-value').textContent = val.toFixed(2);
    const wP = Math.max(0, 1 - params.wHeaven - params.wEarth);
    document.getElementById('bar-heaven').style.width = (params.wHeaven * 100) + '%';
    document.getElementById('bar-earth').style.width  = (params.wEarth  * 100) + '%';
    document.getElementById('bar-human').style.width  = (wP * 100) + '%';
    document.getElementById('num-heaven').textContent = params.wHeaven.toFixed(2);
    document.getElementById('num-earth').textContent  = params.wEarth.toFixed(2);
    document.getElementById('num-human').textContent  = wP.toFixed(2);
    document.getElementById('wHeaven-value').textContent = params.wHeaven.toFixed(2);
    document.getElementById('wEarth-value').textContent  = params.wEarth.toFixed(2);
}

function updateColor() {
    const h = document.getElementById('color-heaven').value;
    const e = document.getElementById('color-earth').value;
    const p = document.getElementById('color-human').value;
    const b = document.getElementById('color-bg').value;
    params.colorPalette = [h, e, p];
    params.bgColor = b;
    document.getElementById('color-heaven-hex').textContent = h;
    document.getElementById('color-earth-hex').textContent  = e;
    document.getElementById('color-human-hex').textContent  = p;
    document.getElementById('color-bg-hex').textContent     = b;
}

function updateSeedDisplay() {
    document.getElementById('seed-input').value = params.seed;
}

function updateSeed() {
    const v = parseInt(document.getElementById('seed-input').value);
    if (v && v > 0) { params.seed = v; initializeSystem(); }
    else updateSeedDisplay();
}

function previousSeed() { params.seed = Math.max(1, params.seed - 1); updateSeedDisplay(); initializeSystem(); }
function nextSeed()     { params.seed += 1; updateSeedDisplay(); initializeSystem(); }
function randomSeedAndUpdate() { params.seed = Math.floor(Math.random() * 99999) + 1; updateSeedDisplay(); initializeSystem(); }

function regenerate() { initializeSystem(); }

function resetParameters() {
    Object.assign(params, JSON.parse(JSON.stringify(defaultParams)));

    document.getElementById('particleCount').value = params.particleCount;
    document.getElementById('particleCount-value').textContent = params.particleCount;
    document.getElementById('noiseScale').value = params.noiseScale;
    document.getElementById('noiseScale-value').textContent = params.noiseScale;
    document.getElementById('stepSize').value = params.stepSize;
    document.getElementById('stepSize-value').textContent = params.stepSize;
    document.getElementById('lifespan').value = params.lifespan;
    document.getElementById('lifespan-value').textContent = params.lifespan;
    document.getElementById('timeSpeed').value = params.timeSpeed;
    document.getElementById('timeSpeed-value').textContent = params.timeSpeed;
    document.getElementById('earthForce').value = params.earthForce;
    document.getElementById('earthForce-value').textContent = params.earthForce;
    document.getElementById('trailAlpha').value = params.trailAlpha;
    document.getElementById('trailAlpha-value').textContent = params.trailAlpha;
    document.getElementById('wHeaven').value = params.wHeaven;
    document.getElementById('wEarth').value  = params.wEarth;
    updateWeights('wHeaven', params.wHeaven);

    document.getElementById('color-heaven').value = params.colorPalette[0];
    document.getElementById('color-earth').value  = params.colorPalette[1];
    document.getElementById('color-human').value  = params.colorPalette[2];
    document.getElementById('color-bg').value     = params.bgColor;
    document.getElementById('color-heaven-hex').textContent = params.colorPalette[0];
    document.getElementById('color-earth-hex').textContent  = params.colorPalette[1];
    document.getElementById('color-human-hex').textContent  = params.colorPalette[2];
    document.getElementById('color-bg-hex').textContent     = params.bgColor;

    updateSeedDisplay();
    initializeSystem();
}

function exportImage() {
    saveCanvas('三才流場_seed' + params.seed, 'png');
}

window.addEventListener('load', updateSeedDisplay);
</script>
