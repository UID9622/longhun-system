.luoshu-mini {
  display: grid;
  grid-template-columns: repeat(3,36px);

  margin: 0 auto 28px;

.luoshu-mini .cell {
  width: 36px; height: 36px;
  border: 1px solid var(--border);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: bold;

  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  width: 100%;
  max-width: 1100px;
  margin-bottom: 40px;

.palace {

  background: var(--panel);
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 180px;
  position: relative;
  overflow: hidden;
}
.palace::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0;
  transition: opacity 0.2s;
  border-radius: 10px;
}
.palace:hover { transform: translateY(-2px); }
.palace:hover::before { opacity: 1; }
.palace.center {
  border-color: var(--gold);
  background: rgba(200,168,75,0.06);
}

.palace-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

  border-radius: 50%;

.palace-desc { font-size: 10px; color: var(--muted); margin-top: 2px; }

.page-item:last-child { border-bottom: none; }

.page-item a {

.page-item a:hover { color: var(--gold); }

// 洛书顺序
const ORDER = [4,9,2, 3,5,7, 8,1,6];

function renderGrid(filter = null) {
  const grid = document.getElementById('nineGrid');
  grid.innerHTML = '';

  ORDER.forEach(num => {
    const p = PALACES[num];
    const isCenter = num === 5;
    const pages = filter ? p.pages.filter(pg => pg.title.toLowerCase().includes(filter)) : p.pages;

    const palace = document.createElement('div');
    palace.className = 'palace' + (isCenter ? ' center' : '');
    palace.style.setProperty('--hover-bg', p.color + '15');
    palace.style.borderColor = isCenter ? p.color : '';

    palace.innerHTML = `
      <div class="palace-header">
        <div class="palace-num" style="background:${p.color}22;color:${p.color};border:1px solid ${p.color}44">${p.icon}</div>
        <div class="palace-info">
          <div class="palace-title" style="color:${p.color}">${p.name}</div>
          <div class="palace-desc">${p.desc}</div>
        </div>
        <div class="palace-count">${pages.length}</div>
      </div>
      <ul class="page-list">
        ${pages.map(pg => `
          <li class="page-item">
            <div class="page-dot" style="background:${p.color}"></div>
            ${pg.url ? `<a href="${pg.url}" target="_blank">${pg.title}</a>` : `<span>${pg.title}</span>`}
            ${pg.type === 'database' ? '<span class="page-type">db</span>' : ''}
          </li>
        `).join('')}
      </ul>
    `;

    palace.addEventListener('mouseenter', () => {
      palace.style.borderColor = p.color;
      palace.style.boxShadow = `0 0 20px ${p.color}20`;
    });
    palace.addEventListener('mouseleave', () => {
      palace.style.borderColor = isCenter ? p.color : '';
      palace.style.boxShadow = '';
    });

    grid.appendChild(palace);
  });
}

function filterAll() {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.filter-btn')[0].classList.add('active');
  renderGrid(null);
}

function filterPalace(num) {
  // highlight selected palace
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  // scroll to palace
  const grids = document.querySelectorAll('.palace');
  ORDER.forEach((n, i) => {
    if (n === num) {
      grids[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
      grids[i].style.boxShadow = `0 0 30px ${PALACES[num].color}40`;
      setTimeout(() => { grids[i].style.boxShadow = ''; }, 2000);
    }
  });
}

function renderStats() {
  const bar = document.getElementById('statsBar');
  const total = Object.values(PALACES).reduce((s, p) => s + p.pages.length, 0);
  bar.innerHTML = `<div class="stat-item"><span>共 <strong style="color:var(--gold)">${total}</strong> 页 · 洛书归一</span></div>` +
    ORDER.map(n => {
      const p = PALACES[n];
      return `<div class="stat-item"><div class="stat-dot" style="background:${p.color}"></div><span style="color:${p.color}">${p.name.split('·')[1]}</span><span>${p.pages.length}</span></div>`;
    }).join('');
}
