<script>
// ── 常量 ──────────────────────────────────────────────────────
const SEED         = 9622;
const N            = 1200;       // 粒子数
const TRAIL_LEN    = 18;         // 轨迹长度
const BREATH_RATE  = 0.008;      // 呼吸频率
const HEAVEN_W     = 0.35;       // 天场权重
const EARTH_W      = 0.15;       // 地场权重
const HUMAN_W      = 0.50;       // 人场权重
const MAX_RINGS    = 12;         // 最大年轮数
const RING_INTERVAL= 300;        // 年轮生成间隔（帧）
const DT           = 0.016;      // 时间步长
const HEBB_RATE    = 0.001;      // Hebbian学习率

// ── Seeded PRNG (mulberry32) ──────────────────────────────────
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const rng = mulberry32(SEED);

// ── Perlin Noise (简化版，基于 SEED) ─────────────────────────
const perm = new Uint8Array(512);
(function() {
  const p = new Uint8Array(256);
  for (let i = 0; i < 256; i++) p[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [p[i], p[j]] = [p[j], p[i]];
  }
  for (let i = 0; i < 512; i++) perm[i] = p[i & 255];
})();

function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lerp(a, b, t) { return a + t * (b - a); }
function grad(h, x, y) {
  const v = h & 3;
  const u = v < 2 ? x : y, w = v < 2 ? y : x;
  return (v & 1 ? -u : u) + (v & 2 ? -w : w);
}
function noise2(x, y) {
  const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
  x -= Math.floor(x); y -= Math.floor(y);
  const u = fade(x), v = fade(y);
  const a = perm[X] + Y, b = perm[X + 1] + Y;
  return lerp(
    lerp(grad(perm[a],     x,     y), grad(perm[b],     x - 1, y),     u),
    lerp(grad(perm[a + 1], x,     y - 1), grad(perm[b + 1], x - 1, y - 1), u),
    v
  );
}

// ── GrowthRing（年轮·甜甜圈引力场）─────────────────────────
class GrowthRing {
  constructor(x, y, frameCreated) {
    this.x = x;
    this.y = y;
    this.r = 40 + rng() * 60;        // 内径
    this.outerR = this.r * 2.5;      // 外径
    this.strength = 0.8 + rng() * 1.2;
    this.created = frameCreated;
    this.alpha = 1.0;
  }
  decay(frame) {
    const age = frame - this.created;
    this.alpha = Math.max(0, 1 - age / 600);
  }
  force(px, py) {
    const dx = px - this.x, dy = py - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) return [0, 0];
    // 甜甜圈：内圈排斥，中间吸引，外圈排斥
    const norm = dist / this.r;
    let mag = 0;
    if (norm < 1) mag = -this.strength * (1 - norm);          // 内圈排斥
    else if (norm < 2) mag = this.strength * (norm - 1) * (2 - norm) * 2; // 吸引
    else if (norm < this.outerR / this.r) mag = -this.strength * 0.3;    // 外圈弱排斥
    mag *= this.alpha;
    return [mag * dx / dist, mag * dy / dist];
  }
}

// ── Particle ─────────────────────────────────────────────────
class Particle {
  constructor(W, H) {
    this.reset(W, H);
    this.synapticWeight = rng() * 0.5; // Hebbian突触权重
    this.firingRate = 0;
  }
  reset(W, H) {
    this.x = rng() * W;
    this.y = rng() * H;
    this.vx = (rng() - 0.5) * 0.5;
    this.vy = (rng() - 0.5) * 0.5;
    this.trail = [];
    this.hue = 200 + rng() * 80; // 蓝紫色系
    this.size = 0.8 + rng() * 1.4;
    this.mass = 0.5 + rng() * 1.0;
  }
  update(W, H, frame, breathAmp, rings, noiseT) {
    // 天场（Perlin噪声流场）
    const nx = this.x / W * 3 + noiseT;
    const ny = this.y / H * 3 + noiseT * 0.7;
    const angle = noise2(nx, ny) * Math.PI * 4;
    const heavenFx = Math.cos(angle) * HEAVEN_W;
    const heavenFy = Math.sin(angle) * HEAVEN_W;

    // 地场（引力中心 + 呼吸振荡）
    const cx = W / 2, cy = H / 2;
    const dx = cx - this.x, dy = cy - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy) + 1;
    const breathForce = breathAmp * 0.3;
    const earthFx = (dx / dist) * EARTH_W * breathForce;
    const earthFy = (dy / dist) * EARTH_W * breathForce;

    // 人场（年轮引力叠加）
    let humanFx = 0, humanFy = 0;
    for (const ring of rings) {
      const [fx, fy] = ring.force(this.x, this.y);
      humanFx += fx;
      humanFy += fy;
    }
    humanFx *= HUMAN_W;
    humanFy *= HUMAN_W;

    // 三才合力
    const ax = (heavenFx + earthFx + humanFx) / this.mass;
    const ay = (heavenFy + earthFy + humanFy) / this.mass;

    this.vx += ax * DT;
    this.vy += ay * DT;

    // 速度限制 + Hebbian摩擦
    const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    const maxSpd = 2.5 + this.synapticWeight * 1.5;
    if (spd > maxSpd) {
      this.vx = this.vx / spd * maxSpd;
      this.vy = this.vy / spd * maxSpd;
    }
    this.vx *= 0.98;
    this.vy *= 0.98;

    // 记录轨迹
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > TRAIL_LEN) this.trail.shift();

    this.x += this.vx;
    this.y += this.vy;

    // 边界环绕
    if (this.x < 0) this.x += W;
    if (this.x > W) this.x -= W;
    if (this.y < 0) this.y += H;
    if (this.y > H) this.y -= H;

    // 发放率（用于Hebbian）
    this.firingRate = Math.min(1, spd / maxSpd);

    // Hebbian可塑性：活跃粒子权重上升
    if (this.firingRate > 0.7) {
      this.synapticWeight = Math.min(1, this.synapticWeight + HEBB_RATE);
    } else {
      this.synapticWeight = Math.max(0, this.synapticWeight - HEBB_RATE * 0.3);
    }
  }

  draw(ctx) {
    if (this.trail.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(this.trail[0].x, this.trail[0].y);
    for (let i = 1; i < this.trail.length; i++) {
      const t = i / this.trail.length;
      const alpha = t * 0.6 * (0.3 + this.synapticWeight * 0.7);
      const lightness = 40 + this.synapticWeight * 30;
      ctx.strokeStyle = `hsla(${this.hue},80%,${lightness}%,${alpha})`;
      ctx.lineWidth = this.size * t;
      ctx.lineTo(this.trail[i].x, this.trail[i].y);
    }
    ctx.stroke();
    // 粒子头部
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 1.2, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue},90%,${60 + this.firingRate * 30}%,${0.5 + this.firingRate * 0.5})`;
    ctx.fill();
  }
}

// ── 主程序 ────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => {
  resize();
  particles.forEach(p => p.trail = []);
});

// 初始化粒子
const particles = Array.from({ length: N }, () => new Particle(W, H));

// 年轮系统
const rings = [];
let frame = 0;
let noiseT = 0;

// 呼吸节律
let breathPhase = 0;
let breathAmp = 0;
let breathDir = 1; // ↑ 吸 ↓ 呼

// 背景渐变蒙版
function drawBg() {
  ctx.fillStyle = 'rgba(5, 5, 16, 0.18)';
  ctx.fillRect(0, 0, W, H);
}

// 绘制年轮环
function drawRings() {
  for (const ring of rings) {
    if (ring.alpha <= 0) continue;
    // 外圈
    ctx.beginPath();
    ctx.arc(ring.x, ring.y, ring.outerR, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(108,131,226,${ring.alpha * 0.08})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    // 内圈
    ctx.beginPath();
    ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(108,131,226,${ring.alpha * 0.15})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // 中心点
    ctx.beginPath();
    ctx.arc(ring.x, ring.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,200,255,${ring.alpha * 0.4})`;
    ctx.fill();
  }
}

// 更新HUD
function updateHUD() {
  const avgSynapse = particles.reduce((s, p) => s + p.synapticWeight, 0) / N;
  const avgFiring  = particles.reduce((s, p) => s + p.firingRate, 0) / N;
  document.getElementById('h-frame').textContent   = `帧: ${frame}`;
  document.getElementById('h-rings').textContent   = `年轮: ${rings.length}`;
  document.getElementById('h-breath').textContent  = `呼吸: ${breathDir > 0 ? '↑ 吸气' : '↓ 呼气'}`;
  document.getElementById('h-heaven').textContent  = `天场强度: ${breathAmp.toFixed(3)}`;
  document.getElementById('h-human').textContent   = `人场密度: ${(rings.length / MAX_RINGS).toFixed(3)}`;
  document.getElementById('h-plastic').textContent = `突触可塑: ${avgSynapse.toFixed(3)}`;
}

// 主循环
function loop() {
  requestAnimationFrame(loop);

  // 呼吸节律
  breathPhase += BREATH_RATE;
  breathAmp = (Math.sin(breathPhase) + 1) / 2;
  breathDir = Math.cos(breathPhase) > 0 ? 1 : -1;

  // Perlin时间轴
  noiseT += 0.003;

  // 自动生成年轮
  if (frame % RING_INTERVAL === 0 && frame > 0) {
    if (rings.length >= MAX_RINGS) rings.shift();
    rings.push(new GrowthRing(
      W * 0.2 + rng() * W * 0.6,
      H * 0.2 + rng() * H * 0.6,
      frame
    ));
  }

  // 更新年轮衰减
  for (const ring of rings) ring.decay(frame);

  // 绘制
  drawBg();
  drawRings();

  // 更新+绘制粒子
  for (const p of particles) {
    p.update(W, H, frame, breathAmp, rings, noiseT);
    p.draw(ctx);
  }

  // 每30帧更新HUD
  if (frame % 30 === 0) updateHUD();

  frame++;
}

// 点击注入年轮
canvas.addEventListener('click', (e) => {
  if (rings.length >= MAX_RINGS) rings.shift();
  rings.push(new GrowthRing(e.clientX, e.clientY, frame));
  // 点击时粒子受到冲击
  for (const p of particles) {
    const dx = p.x - e.clientX, dy = p.y - e.clientY;
    const dist = Math.sqrt(dx * dx + dy * dy) + 1;
    if (dist < 200) {
      p.vx += (dx / dist) * (1 - dist / 200) * 3;
      p.vy += (dy / dist) * (1 - dist / 200) * 3;
    }
  }
});

// ── 接通 /persona/stats · 三才权重实时更新 ────────────────
async function loadLiveWeights() {
  try {
    const resp = await fetch("http://localhost:9622/persona/stats");
    if (!resp.ok) return;
    const d = await resp.json();

    // 实时更新三才权重（归一化到 0-1）
    HUMAN_W  = Math.max(0.05, Math.min(0.80, d.humanWeight  / 100));
    HEAVEN_W = Math.max(0.05, Math.min(0.60, d.systemWeight / 100));
    EARTH_W  = Math.max(0.05, Math.min(0.30, d.fenceWeight  / 100));

    // 归一化（三者之和保持=1）
    const sum = HUMAN_W + HEAVEN_W + EARTH_W;
    HUMAN_W  /= sum;
    HEAVEN_W /= sum;
    EARTH_W  /= sum;

    // 最活跃人格显示在 HUD
    const topLabel = d.topPersona || "宝宝·温度";
    document.getElementById('h-human').textContent =
      `人场密度: ${(d.humanWeight / 100).toFixed(3)}  [${topLabel}]`;

    // 底线触碰过多 → 粒子色相偏红
    if (d.fenceWeight > 10) {
      particles.forEach(p => { p.hue = 0 + Math.random() * 30; }); // 偏红
    }
  } catch (e) {
    // 离线时静默失败·权重保持默认
  }
}

// 每30秒刷一次·启动时立即读一次
setInterval(loadLiveWeights, 30000);
loadLiveWeights();

// ── 接收 /flow/colorize 染色指令 ─────────────────────────
async function applyColorize() {
  try {
    const resp = await fetch("http://localhost:9622/flow/colorize");
    if (!resp.ok) return;
    const d = await resp.json();
    if (d.trigger === "default" || !d.timestamp) return;
    // 用染色指令覆盖粒子色相
    const hue = d.hue || 180;
    const intensity = d.intensity || 0.5;
    particles.forEach(p => {
      p.hue = hue + (Math.random() - 0.5) * 30;
      p.alpha = Math.min(1.0, p.alpha * (0.5 + intensity));
    });
  } catch (e) { /* 离线静默 */ }
}
setInterval(applyColorize, 5000);
applyColorize();

// 启动
loop();
</script>
