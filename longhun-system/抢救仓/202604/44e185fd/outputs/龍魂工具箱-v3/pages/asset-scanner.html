<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐲 龍魂数字资产扫描器 v2.0</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; padding: 20px;
}
.container {
  max-width: 1200px; margin: 0 auto;
  background: rgba(255,255,255,0.95);
  border-radius: 20px; padding: 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid #667eea; padding-bottom: 20px; }
.header h1 { font-size: 36px; color: #667eea; margin-bottom: 10px; }
.header .subtitle { color: #666; font-size: 14px; margin-bottom: 10px; }
.dna-code {
  background: #f0f0f0; padding: 10px 20px; border-radius: 8px;
  font-family: "Consolas", "Monaco", monospace;
  font-size: 12px; color: #666; display: inline-block;
}
.upload-area {
  border: 3px dashed #667eea; border-radius: 15px; padding: 40px;
  text-align: center; background: #f8f9fa; cursor: pointer;
  transition: all 0.3s; margin-bottom: 30px;
}
.upload-area:hover { background: #e9ecef; border-color: #764ba2; }
.upload-area.dragover { background: #d1e7dd; border-color: #28a745; }
.upload-icon { font-size: 48px; margin-bottom: 15px; }
.upload-text { font-size: 18px; color: #666; margin-bottom: 10px; }
.upload-hint { font-size: 14px; color: #999; }
#fileInput { display: none; }
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px; margin-bottom: 30px;
}
.stat-card {
  background: white; border-radius: 10px; padding: 20px; text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.stat-value { font-size: 32px; font-weight: bold; color: #667eea; margin-bottom: 5px; }
.stat-label { font-size: 14px; color: #666; }
.results-section { margin-bottom: 30px; }
.section-title {
  font-size: 20px; font-weight: bold; color: #333;
  margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #667eea;
}
.file-list { max-height: 500px; overflow-y: auto; }
.file-item {
  background: white; border: 2px solid #e0e0e0;
  border-radius: 8px; padding: 15px; margin-bottom: 10px;
  transition: all 0.3s;
}
.file-item:hover { border-color: #667eea; transform: translateY(-2px); }
.file-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.file-name { font-weight: bold; color: #333; font-size: 14px; }
.file-type { font-size: 12px; padding: 4px 8px; border-radius: 4px; }
.type-core { background: #d4edda; color: #155724; }
.type-original { background: #cce5ff; color: #004085; }
.type-mixed { background: #fff3cd; color: #856404; }
.type-external { background: #f8d7da; color: #721c24; }
.type-unknown { background: #e2e3e5; color: #383d41; }
.file-info { font-size: 12px; color: #666; margin-bottom: 5px; }
.file-markers { font-size: 11px; color: #999; }
.controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
button {
  padding: 12px 24px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s;
}
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
.btn-secondary { background: #6c757d; color: white; }
.btn-secondary:hover { background: #5a6268; }
.btn-success { background: #28a745; color: white; }
.btn-success:hover { background: #218838; }
.search-box {
  display: flex; gap: 10px; margin-bottom: 20px;
}
.search-input {
  flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px;
  font-size: 14px; transition: border-color 0.3s;
}
.search-input:focus { outline: none; border-color: #667eea; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🐲 龍魂数字资产扫描器 v2.0</h1>
    <div class="subtitle">完整关键词版 | 核心原创识别 | 混合代码检测 | 资产分类统计</div>
    <div class="dna-code">DNA: #龍芯⚡️2026-03-03-ASSET-SCANNER-V2-UID9622</div>
  </div>

  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">📁</div>
    <div class="upload-text">拖拽文件到这里，或点击选择文件</div>
    <div class="upload-hint">支持 .md, .csv, .txt, .py, .js, .ts, .cpp, .html, .json 等格式</div>
    <input type="file" id="fileInput" multiple accept=".md,.csv,.txt,.py,.js,.ts,.cpp,.hpp,.html,.json,.sh,.cnsh">
  </div>

  <div class="controls">
    <button class="btn-primary" onclick="scanFiles()">🔍 开始扫描</button>
    <button class="btn-success" onclick="exportJSON()">📄 导出 JSON</button>
    <button class="btn-success" onclick="exportMarkdown()">📝 导出 Markdown</button>
    <button class="btn-secondary" onclick="clearResults()">🗑️ 清空结果</button>
  </div>

  <div class="search-box">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索关键词（如：UID9622、宝宝、龍魂...）">
    <button class="btn-primary" onclick="searchKeyword()">搜索</button>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="stat-value" id="coreCount">0</div>
      <div class="stat-label">✅ 核心原创</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="originalCount">0</div>
      <div class="stat-label">🟢 原创</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="mixedCount">0</div>
      <div class="stat-label">🟡 混合</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="externalCount">0</div>
      <div class="stat-label">📦 外部</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="unknownCount">0</div>
      <div class="stat-label">❓ 未标记</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">📊 总计</div>
    </div>
  </div>

  <div class="results-section">
    <div class="section-title">📁 扫描结果</div>
    <div class="file-list" id="fileList">
      <div style="color:#999;text-align:center;padding:40px;">
        暂无扫描结果<br><small>请上传文件或拖拽文件到上方区域</small>
      </div>
    </div>
  </div>
</div>

<script src="../modules/asset-scanner.js"></script>
<script>
let scanResults = [];
let currentReport = null;

// ===== 文件上传 =====
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());

uploadArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', () => {
  uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', (e) => {
  handleFiles(e.target.files);
});

function handleFiles(files) {
  console.log(`📁 接收到 ${files.length} 个文件`);
}

// ===== 扫描文件 =====
async function scanFiles() {
  const files = fileInput.files;
  if (files.length === 0) {
    alert('请先选择文件！');
    return;
  }

  console.log(`🔍 开始扫描 ${files.length} 个文件...`);

  if (!window.assetScanner) {
    alert('资产扫描器模块未加载！');
    return;
  }

  try {
    scanResults = await window.assetScanner.batchScanFiles(files);
    currentReport = window.assetScanner.generateReport(scanResults);

    updateStats();
    updateFileList(scanResults);

    console.log(`✅ 扫描完成！`);
    console.log(`   核心原创: ${currentReport.统计['✅ 核心原创']} 个`);
    console.log(`   其他原创: ${currentReport.统计['🟢 原创']} 个`);
    console.log(`   合计原创: ${currentReport.统计.合计原创} / ${currentReport.统计.总计} 个`);

    alert(`扫描完成！\n\n核心原创: ${currentReport.统计['✅ 核心原创']} 个\n其他原创: ${currentReport.统计['🟢 原创']} 个\n合计原创: ${currentReport.统计.合计原创} / ${currentReport.统计.总计} 个`);

  } catch (error) {
    console.error('扫描失败:', error);
    alert('扫描失败：' + error.message);
  }
}

// ===== 更新统计 =====
function updateStats() {
  if (!currentReport) return;

  document.getElementById('coreCount').textContent = currentReport.统计['✅ 核心原创'];
  document.getElementById('originalCount').textContent = currentReport.统计['🟢 原创'];
  document.getElementById('mixedCount').textContent = currentReport.统计['🟡 混合'];
  document.getElementById('externalCount').textContent = currentReport.统计['📦 外部'];
  document.getElementById('unknownCount').textContent = currentReport.统计['❓ 未标记'];
  document.getElementById('totalCount').textContent = currentReport.统计.总计;
}

// ===== 更新文件列表 =====
function updateFileList(results) {
  const container = document.getElementById('fileList');

  if (results.length === 0) {
    container.innerHTML = '<div style="color:#999;text-align:center;padding:40px;">暂无扫描结果</div>';
    return;
  }

  container.innerHTML = results.map(item => {
    const typeClass = getTypeClass(item.类型);
    return `
      <div class="file-item">
        <div class="file-header">
          <div class="file-name">${item.文件}</div>
          <div class="file-type ${typeClass}">${item.类型}</div>
        </div>
        <div class="file-info">
          字符数: ${item.字符数} | 文件大小: ${formatFileSize(item.文件大小)} | 修改时间: ${item.修改时间}
        </div>
        ${item.原创标记 && item.原创标记.length > 0 ? `
          <div class="file-markers">
            标记: ${item.原创标记.slice(0, 3).join(', ')}${item.原创标记.length > 3 ? '...' : ''}
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

function getTypeClass(type) {
  switch (type) {
    case '✅ 核心原创': return 'type-core';
    case '🟢 原创': return 'type-original';
    case '🟡 混合': return 'type-mixed';
    case '📦 外部': return 'type-external';
    default: return 'type-unknown';
  }
}

function formatFileSize(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
}

// ===== 搜索关键词 =====
function searchKeyword() {
  const keyword = document.getElementById('searchInput').value.trim();
  if (!keyword) {
    alert('请输入关键词！');
    return;
  }

  if (!window.assetScanner) {
    alert('资产扫描器模块未加载！');
    return;
  }

  const results = window.assetScanner.searchKeyword(keyword, scanResults);

  if (results.length === 0) {
    alert(`未找到包含 "${keyword}" 的文件`);
    updateFileList([]);
  } else {
    alert(`找到 ${results.length} 个包含 "${keyword}" 的文件`);
    updateFileList(results);
  }
}

// ===== 导出功能 =====
function exportJSON() {
  if (!currentReport) {
    alert('请先扫描文件！');
    return;
  }

  const json = window.assetScanner.exportReportToJSON(currentReport);
  downloadFile(json, `龍魂资产扫描报告_${new Date().toISOString().split('T')[0]}.json`, 'application/json');
}

function exportMarkdown() {
  if (!currentReport) {
    alert('请先扫描文件！');
    return;
  }

  const markdown = window.assetScanner.exportReportToMarkdown(currentReport);
  downloadFile(markdown, `龍魂资产扫描报告_${new Date().toISOString().split('T')[0]}.md`, 'text/markdown');
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type: type });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.click();
  URL.revokeObjectURL(url);
}

// ===== 清空结果 =====
function clearResults() {
  scanResults = [];
  currentReport = null;
  fileInput.value = '';

  document.getElementById('coreCount').textContent = '0';
  document.getElementById('originalCount').textContent = '0';
  document.getElementById('mixedCount').textContent = '0';
  document.getElementById('externalCount').textContent = '0';
  document.getElementById('unknownCount').textContent = '0';
  document.getElementById('totalCount').textContent = '0';
  document.getElementById('fileList').innerHTML = '<div style="color:#999;text-align:center;padding:40px;">暂无扫描结果<br><small>请上传文件或拖拽文件到上方区域</small></div>';
  document.getElementById('searchInput').value = '';

  console.log('🗑️ 已清空所有结果');
}

// ===== 初始化 =====
window.onload = function() {
  console.log('🐲 龍魂数字资产扫描器 v2.0 启动');
  console.log('DNA: #龍芯⚡️2026-03-03-ASSET-SCANNER-V2-UID9622');
  console.log('确认码: #CONFIRM🌌9622-ONLY-ONCE🧬LK9X-772Z ✅');

  if (window.assetScanner) {
    console.log('✅ 资产扫描器模块已加载');
  } else {
    console.error('❌ 资产扫描器模块未加载');
  }
};
</script>
</body>
</html>
