<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 三色知识库仪表盘 · DNA碎片化</title>
<!--
  DNA: #龍芯⚡️2026-04-08-KNOWLEDGE-DASHBOARD-v1.0
  理念: 不抄知识库，只取碎片，重构生长
  原则: 分可合，一级必胜
-->
<style>
:root {
  --bg: #0a0a12;
  --panel: #13131f;
  --panel2: #1a1a28;
  --border: #2a2a40;
  --gold: #c8a84b;
  --gold2: rgba(200,168,75,0.15);
  --green: #4caf7d;
  --red: #e05a5a;
  --blue: #5a9ae0;
  --purple: #9b59b6;
  --text: #e8e4d9;
  --muted: #55556a;
  --glow: 0 0 30px rgba(200,168,75,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 1400px; margin: 0 auto; }

/* Header */
.header {
  text-align: center;
  padding: 30px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 30px;
}
.header h1 {
  font-size: 2em;
  background: linear-gradient(135deg, var(--gold), #e8d5a3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.header .subtitle {
  color: var(--muted);
  font-size: 0.95em;
}
.header .dna-tag {
  display: inline-block;
  background: var(--gold2);
  border: 1px solid var(--gold);
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 0.75em;
  color: var(--gold);
  margin-top: 10px;
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-bottom: 30px;
}
.stat-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  transition: all 0.3s;
}
.stat-card:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
}
.stat-card .number {
  font-size: 2.5em;
  font-weight: bold;
  color: var(--gold);
}
.stat-card .label {
  color: var(--muted);
  font-size: 0.9em;
  margin-top: 5px;
}
.stat-card .trend {
  font-size: 0.8em;
  margin-top: 8px;
  padding: 2px 8px;
  border-radius: 10px;
  display: inline-block;
}
.trend.up { background: rgba(76,175,125,0.2); color: var(--green); }
.trend.down { background: rgba(224,90,90,0.2); color: var(--red); }

/* Category Cards */
.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}
.category-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.category-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), transparent);
}
.category-card:hover {
  border-color: var(--gold);
  box-shadow: var(--glow);
}
.category-card .icon {
  font-size: 2em;
  margin-bottom: 10px;
}
.category-card h3 {
  font-size: 1.1em;
  margin-bottom: 5px;
}
.category-card .palace {
  font-size: 0.8em;
  color: var(--muted);
  margin-bottom: 15px;
}
.category-card .sites-list {
  font-size: 0.85em;
}
.category-card .site-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.category-card .site-item:last-child { border-bottom: none; }
.category-card .dna-score {
  background: var(--gold2);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.75em;
  color: var(--gold);
}

/* Tools Section */
.tools-section {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 25px;
  margin-bottom: 30px;
}
.tools-section h2 {
  font-size: 1.2em;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}
.tool-card {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 15px;
  cursor: pointer;
  transition: all 0.3s;
}
.tool-card:hover {
  border-color: var(--blue);
  background: rgba(90,154,224,0.1);
}
.tool-card h4 {
  font-size: 1em;
  margin-bottom: 8px;
  color: var(--blue);
}
.tool-card p {
  font-size: 0.85em;
  color: var(--muted);
}

/* Fragment Browser */
.fragment-browser {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 25px;
}
.fragment-browser h2 {
  font-size: 1.2em;
  margin-bottom: 20px;
}
.filter-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-bar input, .filter-bar select {
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 15px;
  border-radius: 8px;
  font-size: 0.9em;
}
.filter-bar input { flex: 1; min-width: 200px; }
.fragment-list {
  max-height: 400px;
  overflow-y: auto;
}
.fragment-item {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  transition: all 0.2s;
}
.fragment-item:hover {
  border-color: var(--gold);
}
.fragment-item .content {
  flex: 1;
}
.fragment-item .type-tag {
  display: inline-block;
  background: var(--gold2);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 0.75em;
  color: var(--gold);
  margin-bottom: 8px;
}
.fragment-item .text {
  font-size: 0.95em;
  line-height: 1.5;
}
.fragment-item .meta {
  font-size: 0.8em;
  color: var(--muted);
  margin-top: 8px;
}
.fragment-item .score {
  background: var(--gold2);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.85em;
  color: var(--gold);
  font-weight: bold;
}
.fragment-item .score.low {
  background: rgba(224,90,90,0.2);
  color: var(--red);
}

/* Status Bar */
.status-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85em;
}
.status-bar .status-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-indicator .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Responsive */
@media (max-width: 768px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .category-grid { grid-template-columns: 1fr; }
  .filter-bar { flex-direction: column; }
  .filter-bar input { width: 100%; }
}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <header class="header">
    <h1>📚 三色知识库仪表盘</h1>
    <p class="subtitle">DNA碎片化采集系统 · 分可合 · 一级必胜</p>
    <span class="dna-tag">#龍芯⚡️2026-04-08-KNOWLEDGE-DASHBOARD-v1.0</span>
  </header>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="number" id="stat-total">0</div>
      <div class="label">知识碎片</div>
      <span class="trend up">+12 今日</span>
    </div>
    <div class="stat-card">
      <div class="number" id="stat-indexed">0</div>
      <div class="label">已索引</div>
    </div>
    <div class="stat-card">
      <div class="number" id="stat-quarantine">0</div>
      <div class="label">隔离区</div>
      <span class="trend down">待审核</span>
    </div>
    <div class="stat-card">
      <div class="number" id="stat-sources">8</div>
      <div class="label">知识源</div>
    </div>
    <div class="stat-card">
      <div class="number">0.80</div>
      <div class="label">平均DNA兼容度</div>
    </div>
  </div>

  <!-- Categories -->
  <div class="category-grid" id="categories">
    <!-- 动态加载 -->
  </div>

  <!-- Tools -->
  <div class="tools-section">
    <h2>🛠️ 工具箱</h2>
    <div class="tool-grid">
      <div class="tool-card" onclick="openIngest()">
        <h4>📥 内容摄入</h4>
        <p>粘贴文本，自动拆解为碎片，DNA检测后入库</p>
      </div>
      <div class="tool-card" onclick="openRecombine()">
        <h4>🧩 碎片重组</h4>
        <p>选择多个碎片，进行串联/融合/交集操作</p>
      </div>
      <div class="tool-card" onclick="openQuarantine()">
        <h4>🔒 隔离区审核</h4>
        <p>审核DNA兼容度不足的碎片，决定通过/拒绝</p>
      </div>
      <div class="tool-card" onclick="openSearch()">
        <h4>🔍 智能搜索</h4>
        <p>按关键词/DNA兼容度/人格适配搜索碎片</p>
      </div>
    </div>
  </div>

  <!-- Fragment Browser -->
  <div class="fragment-browser">
    <h2>📋 碎片浏览</h2>
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="搜索碎片..." onkeyup="searchFragments()">
      <select id="category-filter" onchange="filterFragments()">
        <option value="">所有分类</option>
        <option value="quantum_tech">量子科技</option>
        <option value="dna_tech">DNA技术</option>
        <option value="digital_human">数字人</option>
        <option value="metaverse">元宇宙</option>
        <option value="frontier">前沿挑战</option>
      </select>
      <select id="type-filter" onchange="filterFragments()">
        <option value="">所有类型</option>
        <option value="tag">标签</option>
        <option value="term">术语</option>
        <option value="phrase">短语</option>
        <option value="sentence">句子</option>
      </select>
    </div>
    <div class="fragment-list" id="fragment-list">
      <!-- 动态加载 -->
    </div>
  </div>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <div class="status-indicator">
    <span class="dot"></span>
    <span>API 连接正常</span>
  </div>
  <div>
    <span id="last-update">最后更新: --</span>
  </div>
</div>

<script>
// API配置
const API_BASE = 'http://localhost:8002';

// 分类图标映射
const CATEGORY_ICONS = {
  'quantum_tech': '⚛️',
  'dna_tech': '🧬',
  'digital_human': '🤖',
  'metaverse': '🌐',
  'frontier_challenges': '💡'
};

const CATEGORY_NAMES = {
  'quantum_tech': '量子科技',
  'dna_tech': 'DNA技术',
  'digital_human': '数字人技术',
  'metaverse': '元宇宙',
  'frontier_challenges': '科技挑战'
};

const PALACE_NAMES = {
  1: '坎·技术', 2: '坤·生命', 3: '震·人格',
  4: '巽·网络', 5: '中·核心', 6: '乾·挑战',
  7: '兑·记忆', 8: '艮·算法', 9: '离·未来'
};

// 加载统计数据
async function loadStats() {
  try {
    const res = await fetch(`${API_BASE}/stats`);
    const data = await res.json();
    
    document.getElementById('stat-total').textContent = data.overview.total;
    document.getElementById('stat-indexed').textContent = data.overview.indexed;
    document.getElementById('stat-quarantine').textContent = data.overview.quarantined;
    
    document.getElementById('last-update').textContent = 
      '最后更新: ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error('加载统计失败:', e);
  }
}

// 加载分类
async function loadCategories() {
  try {
    const res = await fetch(`${API_BASE}/sources`);
    const data = await res.json();
    const sources = data.sources || {};
    
    const container = document.getElementById('categories');
    container.innerHTML = '';
    
    for (const [key, category] of Object.entries(sources)) {
      const card = document.createElement('div');
      card.className = 'category-card';
      
      const sitesHtml = category.sites.map(site => `
        <div class="site-item">
          <span>${site.name}</span>
          <span class="dna-score">${(site.dna_compatibility * 100).toFixed(0)}%</span>
        </div>
      `).join('');
      
      card.innerHTML = `
        <div class="icon">${category.icon}</div>
        <h3>${category.name}</h3>
        <div class="palace">宫位: ${PALACE_NAMES[category.palace]}</div>
        <div class="sites-list">${sitesHtml}</div>
      `;
      
      container.appendChild(card);
    }
  } catch (e) {
    console.error('加载分类失败:', e);
  }
}

// 加载碎片
async function loadFragments() {
  try {
    const res = await fetch(`${API_BASE}/fragments?limit=20`);
    const data = await res.json();
    
    const container = document.getElementById('fragment-list');
    container.innerHTML = '';
    
    if (data.fragments.length === 0) {
      container.innerHTML = '<p style="color: var(--muted); text-align: center; padding: 40px;">暂无碎片</p>';
      return;
    }
    
    data.fragments.forEach(frag => {
      const item = document.createElement('div');
      item.className = 'fragment-item';
      
      const scoreClass = frag.compatibility_score >= 0.7 ? '' : 'low';
      
      item.innerHTML = `
        <div class="content">
          <span class="type-tag">${frag.type}</span>
          <div class="text">${frag.content}</div>
          <div class="meta">
            来源: ${frag.source_title} | 
            分类: ${CATEGORY_NAMES[frag.category] || frag.category} |
            宫位: ${PALACE_NAMES[frag.palace]} |
            匹配: ${frag.keywords_matched.slice(0, 2).join(', ')}
          </div>
        </div>
        <div class="score ${scoreClass}">${(frag.compatibility_score * 100).toFixed(0)}%</div>
      `;
      
      container.appendChild(item);
    });
  } catch (e) {
    console.error('加载碎片失败:', e);
    document.getElementById('fragment-list').innerHTML = 
      '<p style="color: var(--red); text-align: center; padding: 40px;">加载失败，请检查API服务</p>';
  }
}

// 搜索碎片
async function searchFragments() {
  const keyword = document.getElementById('search-input').value;
  if (!keyword) {
    loadFragments();
    return;
  }
  
  try {
    const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(keyword)}&limit=20`);
    const data = await res.json();
    
    const container = document.getElementById('fragment-list');
    container.innerHTML = '';
    
    data.results.forEach(frag => {
      const item = document.createElement('div');
      item.className = 'fragment-item';
      const scoreClass = frag.compatibility_score >= 0.7 ? '' : 'low';
      
      item.innerHTML = `
        <div class="content">
          <span class="type-tag">${frag.type}</span>
          <div class="text">${frag.content}</div>
          <div class="meta">
            来源: ${frag.source_title} |
            匹配: ${frag.keywords_matched.slice(0, 2).join(', ')}
          </div>
        </div>
        <div class="score ${scoreClass}">${(frag.compatibility_score * 100).toFixed(0)}%</div>
      `;
      container.appendChild(item);
    });
  } catch (e) {
    console.error('搜索失败:', e);
  }
}

// 筛选碎片
function filterFragments() {
  // 简化版：重新加载后过滤
  loadFragments();
}

// 工具函数
function openIngest() {
  alert('📥 内容摄入工具\n\n请使用API接口:\nPOST /ingest\n{\n  "content": "文本内容",\n  "source_id": "来源ID",\n  "category": "quantum_tech"\n}');
}

function openRecombine() {
  alert('🧩 碎片重组工具\n\n请使用API接口:\nPOST /recombine\n{\n  "fragment_ids": ["id1", "id2"],\n  "operation": "concat"\n}');
}

function openQuarantine() {
  window.open(`${API_BASE}/quarantine`, '_blank');
}

function openSearch() {
  document.getElementById('search-input').focus();
}

// 初始化
async function init() {
  await loadStats();
  await loadCategories();
  await loadFragments();
  
  // 定时刷新
  setInterval(loadStats, 30000);
}

init();
</script>
</body>
</html>
