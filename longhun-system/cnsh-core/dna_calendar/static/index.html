<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍魂日历 · DNA时空胶囊</title>
<style>
  :root {
    --bg:     #0a0a0f;
    --card:   #12121a;
    --border: #1e1e2e;
    --accent: #7c6aff;
    --green:  #4ade80;
    --yellow: #facc15;
    --red:    #f87171;
    --text:   #e2e8f0;
    --muted:  #64748b;
    --dna:    #a78bfa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 顶栏 ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
    background: rgba(10,10,15,0.92);
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--dna));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.02em;
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }

  .status-text { font-size: 12px; color: var(--muted); }

  /* ── 主区 ── */
  main {
    display: grid;
    grid-template-columns: 320px 1fr;
    flex: 1;
    min-height: 0;
  }

  /* ── 左侧面板 ── */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  /* ── 月历小组件 ── */
  .mini-cal {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .cal-nav button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .cal-nav button:hover { background: var(--border); color: var(--text); }

  .cal-title { font-size: 14px; font-weight: 600; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day-label {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
    font-weight: 600;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .cal-day:hover { background: var(--border); }
  .cal-day.today { background: var(--accent); color: white; font-weight: 700; }
  .cal-day.selected { outline: 2px solid var(--accent); }
  .cal-day.has-events::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--dna);
  }
  .cal-day.empty { cursor: default; }

  /* ── 新建事件 ── */
  .add-event {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .add-event input, .add-event textarea, .add-event select {
    width: 100%;
    background: var(--border);
    border: 1px solid #2a2a3e;
    border-radius: 8px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 13px;
    margin-bottom: 8px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .add-event input:focus,
  .add-event textarea:focus { border-color: var(--accent); }
  .add-event textarea { resize: vertical; min-height: 60px; }

  .add-event label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
    display: block;
  }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  /* ── 事件列表 ── */
  .event-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .event-list::-webkit-scrollbar { width: 4px; }
  .event-list::-webkit-scrollbar-track { background: transparent; }
  .event-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .event-group-date {
    padding: 8px 20px 4px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    position: sticky;
    top: 0;
    background: var(--card);
  }

  .event-item {
    padding: 12px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .event-item:hover { background: var(--border); border-left-color: var(--accent); }
  .event-item.active { background: rgba(124,106,255,0.1); border-left-color: var(--accent); }

  .event-item-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .event-item-meta  { font-size: 11px; color: var(--muted); }
  .event-item-dna   { font-size: 10px; color: var(--dna); margin-top: 4px; font-family: monospace; }

  /* ── 右侧详情 ── */
  .detail {
    padding: 32px;
    overflow-y: auto;
    height: calc(100vh - 57px);
  }
  .detail::-webkit-scrollbar { width: 4px; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    gap: 12px;
  }
  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state p { font-size: 14px; }

  .detail-header {
    margin-bottom: 28px;
  }

  .detail-title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .detail-time {
    font-size: 14px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── 时空胶囊卡片 ── */
  .capsule-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .capsule-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .capsule-card-label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .capsule-card-value {
    font-size: 18px;
    font-weight: 700;
  }

  .capsule-card-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── DNA链 ── */
  .dna-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .dna-block h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .dna-trace {
    font-size: 15px;
    color: var(--dna);
    font-family: "SF Mono", "JetBrains Mono", monospace;
    font-weight: 600;
    margin-bottom: 12px;
    word-break: break-all;
  }

  .hash-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 11px;
    font-family: monospace;
  }
  .hash-label { color: var(--muted); min-width: 80px; }
  .hash-value { color: var(--text); word-break: break-all; }

  /* ── 回流按钮 ── */
  .reflow-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #1e1e3f, #2d1b69);
    border: 1px solid var(--accent);
    color: var(--dna);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-bottom: 20px;
    justify-content: center;
  }
  .reflow-btn:hover { background: linear-gradient(135deg, #2d2d5e, #3d2580); }

  /* ── 场景还原结果 ── */
  .reflow-result {
    background: linear-gradient(135deg, rgba(124,106,255,0.05), rgba(167,139,250,0.05));
    border: 1px solid rgba(124,106,255,0.2);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    display: none;
  }
  .reflow-result.visible { display: block; }
  .reflow-result h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--dna);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .reflow-scene-item {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    align-items: flex-start;
  }
  .reflow-scene-icon { font-size: 20px; min-width: 28px; }
  .reflow-scene-content {}
  .reflow-scene-title { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .reflow-scene-value { font-size: 14px; font-weight: 600; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    z-index: 100;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); }
  .toast.error   { border-color: var(--red); }

  /* ── 加载 ── */
  .loading {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .notes-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<header>
  <div class="logo">龍魂日历 · DNA时空胶囊</div>
  <div class="header-right">
    <div class="dot" id="statusDot"></div>
    <span class="status-text" id="statusText">连接中...</span>
  </div>
</header>

<main>
  <!-- ── 左侧 ── -->
  <div class="sidebar">

    <!-- 月历 -->
    <div class="mini-cal">
      <div class="cal-nav">
        <button id="prevMonth">‹</button>
        <span class="cal-title" id="calTitle"></span>
        <button id="nextMonth">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- 新建事件 -->
    <div class="add-event">
      <label>事件标题</label>
      <input type="text" id="evtTitle" placeholder="今天发生了什么…">

      <label>备注</label>
      <textarea id="evtNotes" placeholder="详细记录…"></textarea>

      <div class="row2">
        <div>
          <label>心情</label>
          <select id="evtMood">
            <option value="">— 未记录 —</option>
            <option value="平静">😌 平静</option>
            <option value="开心">😊 开心</option>
            <option value="激动">🔥 激动</option>
            <option value="专注">🎯 专注</option>
            <option value="疲惫">😴 疲惫</option>
            <option value="忧虑">😟 忧虑</option>
          </select>
        </div>
        <div>
          <label>标签（逗号分隔）</label>
          <input type="text" id="evtTags" placeholder="工作,重要">
        </div>
      </div>

      <div class="row2">
        <div>
          <label>纬度（可选）</label>
          <input type="number" id="evtLat" placeholder="39.9042" step="0.0001">
        </div>
        <div>
          <label>经度（可选）</label>
          <input type="number" id="evtLng" placeholder="116.4074" step="0.0001">
        </div>
      </div>

      <button class="btn-primary" id="btnAdd">⚡️ 封印时空胶囊</button>
    </div>

    <!-- 事件列表 -->
    <div class="event-list" id="eventList"></div>
  </div>

  <!-- ── 右侧详情 ── -->
  <div class="detail" id="detail">
    <div class="empty-state">
      <div class="icon">🕰️</div>
      <p>选择一个事件，开始时光回流</p>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const API = 'http://127.0.0.1:9622';
const USER_ID = 'UID9622';

let currentYear, currentMonth, selectedDate = null;
let allEvents = [];
let currentEventDNA = null;

// ── 初始化 ─────────────────────────────────────────────────────

async function init() {
  const now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth();
  renderCalendar();
  await checkStatus();
  await loadEvents();
}

async function checkStatus() {
  try {
    const r = await fetch(API + '/');
    if (r.ok) {
      document.getElementById('statusDot').style.background = 'var(--green)';
      document.getElementById('statusText').textContent = 'CNSH-64 · 运行中';
    }
  } catch(e) {
    document.getElementById('statusDot').style.background = 'var(--red)';
    document.getElementById('statusText').textContent = '服务离线';
  }
}

// ── 日历渲染 ───────────────────────────────────────────────────

function renderCalendar() {
  const months = ['一月','二月','三月','四月','五月','六月',
                  '七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('calTitle').textContent =
    `${currentYear}年 ${months[currentMonth]}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // 星期标签
  ['日','一','二','三','四','五','六'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();

  // 空格
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  // 日期
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;

    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    if (today.getFullYear() === currentYear &&
        today.getMonth() === currentMonth &&
        today.getDate() === d) {
      el.classList.add('today');
    }

    // 标记有事件的日期
    const hasEvent = allEvents.some(e => e.display_date === dateStr);
    if (hasEvent) el.classList.add('has-events');

    if (selectedDate === dateStr) el.classList.add('selected');

    el.addEventListener('click', () => selectDate(dateStr));
    grid.appendChild(el);
  }
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  renderCalendar();
  renderEventList();
}

document.getElementById('prevMonth').addEventListener('click', () => {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
});

// ── 事件列表 ───────────────────────────────────────────────────

async function loadEvents() {
  try {
    const r = await fetch(`${API}/calendar/events/${USER_ID}?limit=100`);
    const data = await r.json();
    allEvents = data.events || [];
    renderCalendar();
    renderEventList();
  } catch(e) {
    console.error(e);
  }
}

function renderEventList() {
  const container = document.getElementById('eventList');
  container.innerHTML = '';

  let events = allEvents;
  if (selectedDate) {
    events = events.filter(e => e.display_date === selectedDate);
  }

  if (!events.length) {
    container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">${selectedDate ? '这天没有事件' : '还没有事件'}</div>`;
    return;
  }

  // 按日期分组
  const groups = {};
  events.forEach(e => {
    const d = e.display_date;
    if (!groups[d]) groups[d] = [];
    groups[d].push(e);
  });

  Object.keys(groups).sort().reverse().forEach(date => {
    const label = document.createElement('div');
    label.className = 'event-group-date';
    label.textContent = date;
    container.appendChild(label);

    groups[date].forEach(evt => {
      const el = document.createElement('div');
      el.className = 'event-item';
      if (evt.dna_trace === currentEventDNA) el.classList.add('active');

      const ts = new Date(evt.timestamp * 1000);
      const timeStr = ts.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
      const mood = evt.mood ? ` · ${moodEmoji(evt.mood)}${evt.mood}` : '';
      const wx = evt.wx_desc ? ` · ${evt.wx_desc}` : '';

      el.innerHTML = `
        <div class="event-item-title">${evt.title}</div>
        <div class="event-item-meta">${timeStr}${mood}${wx}</div>
        <div class="event-item-dna">${evt.dna_trace}</div>
      `;
      el.addEventListener('click', () => showDetail(evt));
      container.appendChild(el);
    });
  });
}

function moodEmoji(mood) {
  const m = {'平静':'😌','开心':'😊','激动':'🔥','专注':'🎯','疲惫':'😴','忧虑':'😟'};
  return m[mood] || '';
}

// ── 详情面板 ───────────────────────────────────────────────────

function showDetail(evt) {
  currentEventDNA = evt.dna_trace;
  renderEventList(); // 刷新高亮

  const ts = new Date(evt.timestamp * 1000);
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  const timeStr = `${ts.getFullYear()}年${ts.getMonth()+1}月${ts.getDate()}日 ${weekdays[ts.getDay()]} ${ts.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}`;

  const wxEmoji = evt.wx_code >= 0 ? weatherEmoji(evt.wx_code) : '🌡️';
  const mood = evt.mood ? moodEmoji(evt.mood) + evt.mood : '—';
  const tags = (() => { try { return JSON.parse(evt.tags || '[]'); } catch(e){ return []; } })();

  document.getElementById('detail').innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${evt.title}</div>
      <div class="detail-time">${timeStr}</div>
    </div>

    <div class="capsule-grid">
      <div class="capsule-card">
        <div class="capsule-card-label">天气</div>
        <div class="capsule-card-value">${wxEmoji} ${evt.wx_temp ? evt.wx_temp + '°C' : '—'}</div>
        <div class="capsule-card-sub">${evt.wx_desc || '未记录'}</div>
      </div>
      <div class="capsule-card">
        <div class="capsule-card-label">心情</div>
        <div class="capsule-card-value">${moodEmoji(evt.mood)} ${evt.mood || '—'}</div>
        <div class="capsule-card-sub">${tags.length ? '🏷 ' + tags.join(' · ') : '无标签'}</div>
      </div>
      <div class="capsule-card">
        <div class="capsule-card-label">位置</div>
        <div class="capsule-card-value" style="font-size:14px">${evt.geo_city || '未记录'}</div>
        <div class="capsule-card-sub">${evt.geo_lat ? `${evt.geo_lat.toFixed(4)}, ${evt.geo_lng.toFixed(4)}` : '无坐标'}</div>
      </div>
      <div class="capsule-card">
        <div class="capsule-card-label">风速</div>
        <div class="capsule-card-value">${evt.wx_wind ? evt.wx_wind + ' km/h' : '—'}</div>
        <div class="capsule-card-sub">湿度 ${evt.wx_humidity ? evt.wx_humidity + '%' : '—'}</div>
      </div>
    </div>

    ${evt.notes ? `<div class="notes-block">${evt.notes}</div>` : ''}

    <button class="reflow-btn" onclick="triggerReflow('${evt.dna_trace}')">
      ⏳ 时光回流 · 还原当时场景
    </button>

    <div class="reflow-result" id="reflowResult"></div>

    <div class="dna-block">
      <h3>🧬 DNA追溯链</h3>
      <div class="dna-trace">${evt.dna_trace}</div>
      <div class="hash-row">
        <span class="hash-label">EVENT</span>
        <span class="hash-value">${evt.event_hash}</span>
      </div>
      <div class="hash-row">
        <span class="hash-label">PREV</span>
        <span class="hash-value">${evt.prev_hash}</span>
      </div>
      <div class="hash-row">
        <span class="hash-label">THIS</span>
        <span class="hash-value" style="color:var(--dna)">${evt.this_hash}</span>
      </div>
    </div>
  `;
}

async function triggerReflow(dnaTrace) {
  const result = document.getElementById('reflowResult');
  if (!result) return;

  result.innerHTML = `<div style="text-align:center;padding:20px"><div class="loading"></div><p style="margin-top:12px;font-size:12px;color:var(--muted)">正在还原时空场景…</p></div>`;
  result.classList.add('visible');

  try {
    const encoded = encodeURIComponent(dnaTrace);
    const r = await fetch(`${API}/calendar/reflow/dna/${encoded}`);
    const scene = await r.json();

    if (scene.error) {
      result.innerHTML = `<p style="color:var(--red)">${scene.error}</p>`;
      return;
    }

    result.innerHTML = `
      <h3>⏳ 时空还原 · ${scene.time}</h3>
      <div class="reflow-scene-item">
        <div class="reflow-scene-icon">${scene.weather.emoji}</div>
        <div class="reflow-scene-content">
          <div class="reflow-scene-title">当时天气</div>
          <div class="reflow-scene-value">${scene.weather.description} · ${scene.weather.temperature}°C · 风速 ${scene.weather.wind_speed} km/h</div>
        </div>
      </div>
      <div class="reflow-scene-item">
        <div class="reflow-scene-icon">📍</div>
        <div class="reflow-scene-content">
          <div class="reflow-scene-title">当时位置</div>
          <div class="reflow-scene-value">${scene.location.city || '未记录'} ${scene.location.lat ? `(${scene.location.lat.toFixed(4)}, ${scene.location.lng.toFixed(4)})` : ''}</div>
        </div>
      </div>
      <div class="reflow-scene-item">
        <div class="reflow-scene-icon">📅</div>
        <div class="reflow-scene-content">
          <div class="reflow-scene-title">时间</div>
          <div class="reflow-scene-value">${scene.time} ${scene.weekday}</div>
        </div>
      </div>
      ${scene.mood ? `
      <div class="reflow-scene-item">
        <div class="reflow-scene-icon">${moodEmoji(scene.mood)}</div>
        <div class="reflow-scene-content">
          <div class="reflow-scene-title">当时心情</div>
          <div class="reflow-scene-value">${scene.mood}</div>
        </div>
      </div>` : ''}
      <div style="margin-top:16px;padding:12px;background:rgba(0,0,0,0.2);border-radius:8px;font-size:11px;font-family:monospace;color:var(--muted)">
        DNA · ${scene.dna_trace}
      </div>
    `;
  } catch(e) {
    result.innerHTML = `<p style="color:var(--red)">还原失败: ${e.message}</p>`;
  }
}

function weatherEmoji(code) {
  if (code === 0)  return '☀️';
  if (code <= 2)   return '🌤️';
  if (code === 3)  return '☁️';
  if (code <= 48)  return '🌫️';
  if (code <= 65)  return '🌧️';
  if (code <= 75)  return '❄️';
  if (code <= 82)  return '🌦️';
  return '⛈️';
}

// ── 新建事件 ───────────────────────────────────────────────────

document.getElementById('btnAdd').addEventListener('click', async () => {
  const title = document.getElementById('evtTitle').value.trim();
  if (!title) { showToast('请填写事件标题', 'error'); return; }

  const btn = document.getElementById('btnAdd');
  btn.innerHTML = '<div class="loading" style="display:inline-block;margin-right:8px"></div> 封印中…';
  btn.disabled = true;

  const lat = parseFloat(document.getElementById('evtLat').value) || 0;
  const lng = parseFloat(document.getElementById('evtLng').value) || 0;
  const tags = document.getElementById('evtTags').value
    .split(',').map(s => s.trim()).filter(Boolean);

  const payload = {
    title,
    user_id: USER_ID,
    mood: document.getElementById('evtMood').value,
    notes: document.getElementById('evtNotes').value,
    tags,
    lat, lng,
    fetch_weather: (lat !== 0 && lng !== 0),
  };

  try {
    const r = await fetch(`${API}/calendar/event`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await r.json();

    showToast(`⚡️ 时空胶囊已封印\n${data.dna_trace}`, 'success');

    // 清空表单
    ['evtTitle','evtNotes','evtTags','evtLat','evtLng'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('evtMood').value = '';

    await loadEvents();
  } catch(e) {
    showToast('封印失败: ' + e.message, 'error');
  } finally {
    btn.innerHTML = '⚡️ 封印时空胶囊';
    btn.disabled = false;
  }
});

// ── Toast ──────────────────────────────────────────────────────

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.className = 'toast'; }, 3500);
}

// ── 启动 ───────────────────────────────────────────────────────

init();
</script>
</body>
</html>
