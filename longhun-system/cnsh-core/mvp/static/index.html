<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNSH · 一句话造一个东西</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d0d1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { color: #888; margin-bottom: 2rem; text-align: center; }
        .input-area { width: 100%; max-width: 600px; }
        textarea {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: #fff;
            font-size: 1rem;
            resize: none;
            height: 100px;
        }
        button {
            width: 100%;
            margin-top: 0.75rem;
            padding: 0.875rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #6c3483, #c0392b);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #result { margin-top: 2rem; width: 100%; max-width: 600px; }
        .result-card {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
        }
        .result-link { color: #a29bfe; text-decoration: none; font-weight: 600; font-size: 1.1rem; }
        .result-link:hover { text-decoration: underline; }
        .meta { color: #888; font-size: 0.875rem; margin-top: 0.5rem; }
        .dna-tag { color: #555; font-size: 0.75rem; margin-top: 0.75rem; }
        .error { color: #e74c3c; }
        .loading { color: #888; }
        .examples {
            margin-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .chip {
            padding: 0.4rem 0.75rem;
            border-radius: 999px;
            background: #1a1a2e;
            border: 1px solid #333;
            color: #aaa;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .chip:hover { border-color: #6c3483; color: #fff; }
    </style>
</head>
<body>
    <h1>⚙️ CNSH</h1>
    <p class="subtitle">一句话 → 造一个东西<br><small>龍魂系统 · MVP v2.0</small></p>

    <div class="input-area">
        <textarea id="userInput" placeholder="做一个个人主页，有头像、简介、联系方式..."></textarea>
        <button id="genBtn" onclick="generate()">🚀 生成页面</button>

        <div class="examples">
            <span class="chip" onclick="setInput('做一个个人主页，有头像、简介、联系方式')">个人主页</span>
            <span class="chip" onclick="setInput('做一个登录页面，科技感风格')">登录页</span>
            <span class="chip" onclick="setInput('做一个作品展示页，带卡片列表和页脚')">作品展示</span>
        </div>
    </div>

    <div id="result"></div>

    <script>
        function setInput(text) {
            document.getElementById('userInput').value = text;
        }

        async function generate() {
            const input = document.getElementById('userInput').value.trim();
            if (!input) return;

            const btn = document.getElementById('genBtn');
            btn.disabled = true;
            document.getElementById('result').innerHTML = '<p class="loading">生成中 · 龍魂系统正在调度...</p>';

            try {
                const res = await fetch('/mvp/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    document.getElementById('result').innerHTML = `
                        <div class="result-card">
                            <a class="result-link" href="${data.url}" target="_blank">🌐 查看生成的页面 →</a>
                            <p class="meta">人格调度: ${data.persona_used} · 风格: ${data.style}</p>
                            <p class="dna-tag">ID: ${data.id} · DNA: ${data.dna}</p>
                        </div>
                    `;
                } else {
                    document.getElementById('result').innerHTML = `<p class="error">❌ ${data.reason}</p>`;
                }
            } catch (e) {
                document.getElementById('result').innerHTML = `<p class="error">❌ 网络错误: ${e.message}</p>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
