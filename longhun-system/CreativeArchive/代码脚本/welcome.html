<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Security-Policy"
		content="default-src 'self' 'unsafe-inline'; img-src 'self' data:; style-src 'self' 'unsafe-inline';">
	<title>CodeArts Agent</title>
	<link rel="stylesheet" href="./welcome.css">
</head>

<body>
	<!-- Window header for controls -->
	<div class="window-header">
		<div class="window-controls">
			<button class="window-control" id="windowMinimize" aria-label="Minimize">
				<img src="./media/window-minimize.svg" alt="Minimize">
			</button>
			<button class="window-control" id="windowMaxRestore" aria-label="Maximize">
				<img src="./media/window-max-restore.svg" alt="Maximize">
			</button>
			<button class="window-control window-close" id="windowClose" aria-label="Close">
				<img src="./media/window-close.svg" alt="Close">
			</button>
		</div>
	</div>

	<!-- Main content -->
	<div class="container">
		<!-- Top: Logo area -->
		<div class="logo-area">
			<img src="./media/logo.svg" alt="Logo">
		</div>

		<!-- Middle: Welcome title -->
		<h1 id="welcomeTitle">
			<span id="welcomeText" class="title-light">Welcome to</span>
			&nbsp;
			<span id="productName" class="title-bold">CodeArts Agent</span>
		</h1>

		<!-- Bottom: Start button -->
		<div class="button-group">
			<button class="btn btn-primary" id="btnStart">
				<span class="btn-primary-text" id="btnStartText">Get Started</span>
			</button>
		</div>
	</div>

	<script src="./locales.js"></script>
	<script src="./welcome.js"></script>
</body>

</html>
