<html>

<head>
	<meta charset="UTF-8">
	<style>
		.loading {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			width: 100%;
			height: 100%;
			background-repeat: no-repeat;
			background-size: cover;
			-webkit-background-size: cover;
		}

		.loading video {
			width: 100%;
			height: 100%;
		}

		.logo {
			position: fixed;
			z-index: 999;
			top: 180px;
			left: 60px;
			color: #fff;
			font-size: 14px;
			font-family: "Inter", "Segoe UI", "Arial", "Microsoft YaHei", "Microsoft Jhenghei", sans-serif;
		}

		#desc,
		#subDesc {
			color: #ACACAD;
			font-size: 16px;
		}

		.light.logo {
			color: #262729 !important;
		}

		.light #desc,
		.light #subDesc {
			color: #676C75 !important;
		}
	</style>
</head>

<body style="background: transparent; user-select: none;">
	<div class="logo" id="content" style="display: none;">
		<div style="font-size: 38px; margin-bottom: 12px; font-weight: SemiBold;">
			<span>CodeArts IDE</span><span style="font-weight: lighter;"> for </span><span id="subProductName"></span>
		</div>
		<div id="desc"></div>
		<div id="subDesc"></div>
	</div>
	<div class="loading">
		<video id="media" autoplay loop></video>
	</div>
</body>
<script>
	const slogans = {
		java: {
			en: {
				desc: 'Intelligent IDE with advanced language,',
				subDesc: 'debugging and AI assisted service.'
			},
			'zh-cn': {
				desc: '智能化集成开发环境，',
				subDesc: '先进的语言、调试和AI辅助服务。'
			}
		},
		web: {
			en: {
				desc: 'Dare to go above and beyond for Web developers.'
			},
			'zh-cn': {
				desc: '为了Web开发者敢于超越一切。'
			}
		},
		cpp: {
			en: {
				desc: 'Write, compile, run, consider it done!'
			},
			'zh-cn': {
				desc: '编码、构建、运行， 我都行！'
			}
		},
		python: {
			en: {
				desc: 'Your path to creativity and productivity.',
			},
			'zh-cn': {
				'desc': '创造，生产，不止于此。'
			}
		},
		remoteshell: {
			en: {
				desc: 'Huawei Cloud at your fingertips.'
			},
			'zh-cn': {
				desc: '华为云触手可及。'
			}
		}
	}

	const getSearchParams = () => {
		const urlParams = new URLSearchParams(window.location.search);
		const locale = urlParams.get('locale');
		const theme = urlParams.get('theme');
		const subProductName = urlParams.get('subProductName');
		return { locale, theme, subProductName };
	}

	let { locale, theme, subProductName } = getSearchParams();
	const slogan = slogans[subProductName];
	const isZhCN = locale === 'zh-cn';
	theme = theme ?? 'dark';

	document.getElementById('subProductName').innerText = subProductName[0].toUpperCase() + subProductName.slice(1);
	document.getElementById('desc').innerText =  isZhCN ? slogan['zh-cn'].desc : slogan.en.desc;

	if(slogan['zh-cn'].subDesc){
		document.getElementById('subDesc').innerText = isZhCN ? slogan['zh-cn'].subDesc : slogan.en.subDesc;
	}else{
		document.getElementById('subDesc').remove();
	}

	const content = document.getElementById('content');
	const media = document.getElementById('media');

	media.setAttribute('src', "./loading.mp4");
	if (theme === 'light') {
		media.setAttribute('src', "./loading_light.mp4");
	}

	media.addEventListener('loadeddata', () => {
		if (media.readyState >= 2) {
			content.style.display = 'block';
			content.classList.toggle('light', theme === 'light');
		}
	});
</script>

</html>
