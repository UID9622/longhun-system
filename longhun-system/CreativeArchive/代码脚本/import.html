<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Security-Policy"
		content="default-src 'self' 'unsafe-inline'; img-src 'self' data:; style-src 'self' 'unsafe-inline';">
	<title>CodeArts Agent</title>
	<link rel="stylesheet" href="./import.css">
</head>

<body>
	<!-- Window header for controls -->
	<div class="window-header">
		<button class="btn back-button" id="btnImportBack" aria-label="Back">
			<span class="back-icon"></span>
			<span class="back-text" id="importBackText">Back</span>
		</button>
		<div class="window-controls">
			<button class="window-control" id="windowMinimize" aria-label="Minimize">
				<img src="./media/window-minimize.svg" alt="Minimize">
			</button>
			<button class="window-control" id="windowMaxRestore" aria-label="Maximize">
				<img src="./media/window-max-restore.svg" alt="Maximize">
			</button>
			<button class="window-control window-close" id="windowClose" aria-label="Close">
				<img src="./media/window-close.svg" alt="Close">
			</button>
		</div>
	</div>

	<!-- Main content -->
	<div class="container" id="import-container">
		<!-- First line: Import title -->
		<h1 id="importTitle">Import Configuration</h1>

		<!-- Second line: Import description -->
		<p id="importDescription">Quickly reuse previous IDE configurations, including extensions, settings, keyboard
			shortcuts, code snippets, etc.</p>

		<!-- Third: Three image icons -->
		<div class="logo-composite">
			<!-- Gear icon -->
			<div class="gear-container">
				<img src="./media/import-gear.svg" alt="Gear" class="gear-icon">
			</div>
			<!-- Left connector line -->
			<div class="connector-line"></div>
			<!-- Link icon -->
			<img src="./media/import-link.svg" alt="Link" class="link">
			<!-- Right connector line -->
			<div class="connector-line"></div>
			<!-- Logo icon -->
			<div class="logo-container">
				<img src="./media/logo.svg" class="logo">
			</div>
		</div>

		<!-- Import progress -->
		<div class="import-progress">
			<div class="import-progress-text" id="importProgressText"></div>
		</div>

		<!-- Buttons -->
		<div class="button-group">
			<!-- Import from VS Code button -->
			<button class="btn btn-primary" id="btnVsCode">
				<span class="btn-primary-text" id="btnVsCodeText">Import from VS Code</span>
				<span class="btn-primary-text" id="btnVsCodeLoadingText" style="display: none;">Importing from VS
					Code</span>
				<img class="btn-loading-icon" src="./media/import-loading.svg" alt="">
			</button>

			<!-- Skip button -->
			<button class="btn btn-secondary" id="btnSkip">
				<span class="btn-secondary-text" id="btnSkipText">Skip</span>
			</button>
		</div>
	</div>

	<!-- Progress bar -->
	<div class="progress-bar"></div>

	<script src="./locales.js"></script>
	<script src="./import.js"></script>
</body>

</html>
