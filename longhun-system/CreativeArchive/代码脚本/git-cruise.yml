version: 1.0
name: git-cruise
language: nodejs


#  构建工具
dependencies:
  base:
    nodejs: 16.15.0
    
#  构建机器
machine:
  standard:
    x86_euler2.10:
      - default
    
#  构建脚本
scripts:
  - export NODE_TLS_REJECT_UNAUTHORIZED=0
  - export NODE_EXTRA_CA_CERTS=/etc/pki/tls/certs/ca-bundle.crt
  - npm i --legacy-peer-deps
  - npm run package
  
#  构建产物
artifacts:
  package:
    - ./guodongsun.vscode-git-cruise-.*.carts$