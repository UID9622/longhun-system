version: '2.0'
env:
  label: Fuxi-Build-x86-euler2.10-vpc-nat
  build_box:
    fuxi_os: x86_euler2.10
    dependencies:
      nodejs: 16.15.0
steps:
  PRE_BUILD:
  - sh:
      command:
        rm -rf /tmp/.next3rd/release/*.json
  - checkout:
      path: null
      submodule: true
      submodule_with_remote: true
  - hwcloud_artifact:
      action: download
  BUILD:
  - build_execute:
      command: sh .build/build.sh
      check:
        auto: true
        mode: sync
        dangerouscmd:
          command: set proxy,git clone,bin/scp,bin/curl,bin/wget,bin/ssh,bin/mount,bin/rsync
  POST_BUILD:
  - hwcloud_artifact:
      version: '1.0'
      package:
      - huizhou.githd-.*.carts$