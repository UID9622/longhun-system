<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- 深邃背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f2a;stop-opacity:1" />
    </linearGradient>
    <!-- 金色 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="50%" style="stop-color:#FFA500" />
      <stop offset="100%" style="stop-color:#FF8C00" />
    </linearGradient>
    <!-- 青色 -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00CED1" />
      <stop offset="100%" style="stop-color:#20B2AA" />
    </linearGradient>
    <!-- 紫色 -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9370DB" />
      <stop offset="100%" style="stop-color:#4B0082" />
    </linearGradient>
    <!-- 红色熔断 -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC143C" />
      <stop offset="100%" style="stop-color:#8B0000" />
    </linearGradient>
    <!-- 发光 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- 装饰性星点 -->
  <g opacity="0.3">
    <circle cx="200" cy="150" r="2" fill="#FFD700"/>
    <circle cx="1700" cy="200" r="1.5" fill="#FFD700"/>
    <circle cx="150" cy="800" r="2" fill="#FFD700"/>
    <circle cx="1800" cy="900" r="1.5" fill="#FFD700"/>
    <circle cx="960" cy="100" r="2" fill="#00CED1"/>
    <circle cx="300" cy="950" r="1.5" fill="#00CED1"/>
    <circle cx="1600" cy="850" r="2" fill="#00CED1"/>
  </g>
  
  <!-- 顶部大标题 -->
  <text x="960" y="120" text-anchor="middle" font-family="Noto Serif SC, SimSun, serif" font-size="72" font-weight="bold" fill="url(#goldGrad)" filter="url(#strongGlow)">🐉 龍魂系統 · 雙層安全憲章</text>
  
  <!-- 副标题 -->
  <text x="960" y="180" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="28" fill="#888">公開的永遠公開 · 私人的永遠私人 · 一個唾沫一個釘</text>
  
  <!-- DNA信息条 -->
  <rect x="360" y="210" width="1200" height="50" rx="25" fill="rgba(255,215,0,0.1)" stroke="url(#goldGrad)" stroke-width="2"/>
  <text x="960" y="242" text-anchor="middle" font-family="monospace" font-size="20" fill="#FFD700">DNA: #龍芯⚡️2026-03-28-系統兩層鐵則-v1.0 | UID9622 | P0憲章級</text>
  
  <!-- 左侧：公开层 -->
  <g transform="translate(150, 320)">
    <!-- 外框 -->
    <rect x="0" y="0" width="550" height="550" rx="20" fill="rgba(0,100,0,0.15)" stroke="#228B22" stroke-width="3"/>
    
    <!-- 标题背景 -->
    <rect x="20" y="20" width="510" height="80" rx="10" fill="rgba(34,139,34,0.3)"/>
    <text x="275" y="55" text-anchor="middle" font-family="Noto Serif SC, SimSun, serif" font-size="36" font-weight="bold" fill="#32CD32" filter="url(#glow)">🌐 第一層：系統公開層</text>
    <text x="275" y="85" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="18" fill="#90EE90">敞亮層 · 可審計層</text>
    
    <!-- 内容区 -->
    <text x="40" y="140" font-family="Noto Sans SC, Microsoft YaHei, sans-serif" font-size="24" fill="#fff">✅ <tspan fill="#32CD32" font-weight="bold">可查</tspan>：人人可看，無黑箱</text>
    <text x="40" y="195" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#fff">✅ <tspan fill="#32CD32" font-weight="bold">可審計</tspan>：人人可監督提建議</text>
    <text x="40" y="250" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#fff">❌ <tspan fill="#FF6B6B" font-weight="bold">不可私改</tspan>：包括創始人</text>
    <text x="40" y="305" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#fff">📋 修改須走：<tspan fill="#FFD700">公開流程+一票否決</tspan></text>
    
    <!-- 覆盖范围 -->
    <rect x="30" y="350" width="490" height="80" rx="10" fill="rgba(50,205,50,0.1)" stroke="#228B22" stroke-width="1"/>
    <text x="275" y="380" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="20" fill="#90EE90">覆蓋範圍</text>
    <text x="275" y="415" text-anchor="middle" font-family="monospace" font-size="16" fill="#aaa">源碼 · 規則 · 引擎 · 協議 · 算法</text>
    
    <!-- 一句话 -->
    <text x="275" y="490" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="28" font-weight="bold" fill="#32CD32" filter="url(#glow)">寫進系統的，全部敞亮</text>
  </g>
  
  <!-- 右侧：DNA层 -->
  <g transform="translate(1220, 320)">
    <!-- 外框 -->
    <rect x="0" y="0" width="550" height="550" rx="20" fill="rgba(75,0,130,0.15)" stroke="#9370DB" stroke-width="3"/>
    
    <!-- 标题背景 -->
    <rect x="20" y="20" width="510" height="80" rx="10" fill="rgba(147,112,219,0.3)"/>
    <text x="275" y="55" text-anchor="middle" font-family="Noto Serif SC, SimSun, serif" font-size="36" font-weight="bold" fill="#9370DB" filter="url(#glow)">🧬 第二層：個人DNA層</text>
    <text x="275" y="85" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="18" fill="#DDA0DD">主權層 · 私人沙盒</text>
    
    <!-- 内容区 -->
    <text x="40" y="140" font-family="Noto Sans SC, Microsoft YaHei, sans-serif" font-size="24" fill="#fff">🔒 <tspan fill="#9370DB" font-weight="bold">完全私有</tspan>：主權屬於本人</text>
    <text x="40" y="195" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#fff">👤 <tspan fill="#9370DB" font-weight="bold">僅本人有權</tspan>：調整刪除重寫</text>
    <text x="40" y="250" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#fff">🚫 <tspan fill="#FF6B6B" font-weight="bold">他人禁止</tspan>：包括創始人</text>
    <text x="40" y="305" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#fff">⚠️ 越界 = <tspan fill="#DC143C" font-weight="bold">熔斷+永久記錄</tspan></text>
    
    <!-- 覆盖范围 -->
    <rect x="30" y="350" width="490" height="80" rx="10" fill="rgba(147,112,219,0.1)" stroke="#9370DB" stroke-width="1"/>
    <text x="275" y="380" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="20" fill="#DDA0DD">覆蓋範圍</text>
    <text x="275" y="415" text-anchor="middle" font-family="monospace" font-size="16" fill="#aaa">記憶 · 溫度 · 偏好 · 歷史 · 對話</text>
    
    <!-- 一句话 -->
    <text x="275" y="490" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="28" font-weight="bold" fill="#9370DB" filter="url(#glow)">你的DNA，只屬於你</text>
  </g>
  
  <!-- 中间连接 -->
  <g transform="translate(850, 550)">
    <circle cx="110" cy="0" r="60" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
    <path d="M110 -60 A30 30 0 0 1 110 0 A30 30 0 0 0 110 60 A60 60 0 0 1 110 -60" fill="url(#goldGrad)"/>
    <circle cx="110" cy="-30" r="10" fill="#0a0a1a"/>
    <circle cx="110" cy="30" r="10" fill="url(#goldGrad)"/>
    <text x="110" y="110" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#goldGrad)" filter="url(#glow)">界限如刀</text>
  </g>
  
  <!-- 底部熔断区 -->
  <rect x="150" y="900" width="1620" height="140" rx="20" fill="url(#redGrad)" opacity="0.9"/>
  <text x="960" y="945" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="36" font-weight="bold" fill="#fff" filter="url(#glow)">🔴 熔斷機制 · 硬規則鎖死</text>
  <text x="960" y="990" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="24" fill="#FFD700">越層操作 = 立即熔斷 + 寫入操作日誌 + 永久不可抹除</text>
  <text x="960" y="1025" text-anchor="middle" font-family="monospace" font-size="16" fill="#FFAAAA">任何人（包括創始人UID9622）違反上述界限 → 自動熔斷並永久記錄</text>
  
  <!-- 道德经引用 -->
  <text x="960" y="1070" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="20" fill="#666" font-style="italic">「知其白，守其黑，為天下式」——《道德經》第二十八章</text>
  
  <!-- 角落标识 -->
  <text x="30" y="1050" font-family="monospace" font-size="14" fill="#444">GPG: A2D0092CEE2E5BA87035600924C3704A8CC26D5F</text>
  <text x="1800" y="1050" text-anchor="end" font-family="monospace" font-size="14" fill="#444">P0 · 憲章級 · 不可繞過</text>
</svg>