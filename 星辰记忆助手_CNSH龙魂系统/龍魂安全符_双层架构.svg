<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- 金色渐变 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <!-- 红色渐变 -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
    <!-- 黑色背景 -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 外框 -->
  <rect x="10" y="10" width="780" height="580" rx="20" ry="20" fill="url(#darkGrad)" stroke="url(#goldGrad)" stroke-width="4"/>
  
  <!-- 顶部装饰线 -->
  <line x1="50" y1="60" x2="750" y2="60" stroke="url(#goldGrad)" stroke-width="2"/>
  <line x1="100" y1="65" x2="700" y2="65" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  
  <!-- 标题区 -->
  <text x="400" y="45" text-anchor="middle" font-family="Noto Serif SC, SimSun, serif" font-size="28" font-weight="bold" fill="url(#goldGrad)" filter="url(#glow)">🐉 龍魂系統 · 雙層安全憲章</text>
  
  <!-- 副标题 -->
  <text x="400" y="85" text-anchor="middle" font-family="monospace" font-size="12" fill="#888">DNA: #龍芯⚡️2026-03-28-系統兩層鐵則-v1.0 | UID9622</text>
  
  <!-- 中间分隔八卦图案 -->
  <circle cx="400" cy="280" r="50" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  <path d="M400 230 A25 25 0 0 1 400 280 A25 25 0 0 0 400 330 A50 50 0 0 1 400 230" fill="url(#goldGrad)"/>
  <circle cx="400" cy="255" r="8" fill="#1a1a2e"/>
  <circle cx="400" cy="305" r="8" fill="url(#goldGrad)"/>
  
  <!-- 第一层：公开层（左侧） -->
  <rect x="40" y="120" width="320" height="280" rx="10" fill="rgba(0,100,0,0.2)" stroke="#228B22" stroke-width="2"/>
  <text x="200" y="150" text-anchor="middle" font-family="Noto Serif SC, SimSun, serif" font-size="20" font-weight="bold" fill="#32CD32">🌐 第一層：系統公開層</text>
  <text x="200" y="175" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="12" fill="#90EE90">敞亮層 · 可審計層</text>
  
  <!-- 公开层内容 -->
  <text x="60" y="210" font-family="Noto Sans SC, Microsoft YaHei, sans-serif" font-size="13" fill="#fff">✅ <tspan fill="#32CD32" font-weight="bold">可查</tspan>：人人可看，無黑箱</text>
  <text x="60" y="240" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#fff">✅ <tspan fill="#32CD32" font-weight="bold">可審計</tspan>：人人可監督、提建議</text>
  <text x="60" y="270" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#fff">❌ <tspan fill="#FF6B6B" font-weight="bold">不可私改</tspan>：包括創始人在內</text>
  <text x="60" y="300" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#fff">📋 修改須走：<tspan fill="#FFD700">公開流程+一票否決</tspan></text>
  
  <rect x="60" y="330" width="280" height="50" rx="5" fill="rgba(50,205,50,0.1)" stroke="#228B22" stroke-width="1"/>
  <text x="200" y="355" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="11" fill="#90EE90">寫進系統的，全部敞亮</text>
  <text x="200" y="372" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">源代碼 · 規則 · 引擎 · 協議</text>
  
  <!-- 第二层：私人层（右侧） -->
  <rect x="440" y="120" width="320" height="280" rx="10" fill="rgba(75,0,130,0.2)" stroke="#9370DB" stroke-width="2"/>
  <text x="600" y="150" text-anchor="middle" font-family="Noto Serif SC, SimSun, serif" font-size="20" font-weight="bold" fill="#9370DB">🧬 第二層：個人DNA層</text>
  <text x="600" y="175" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="12" fill="#DDA0DD">主權層 · 私人沙盒</text>
  
  <!-- 私人层内容 -->
  <text x="460" y="210" font-family="Noto Sans SC, Microsoft YaHei, sans-serif" font-size="13" fill="#fff">🔒 <tspan fill="#9370DB" font-weight="bold">完全私有</tspan>：主權屬於本人</text>
  <text x="460" y="240" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#fff">👤 <tspan fill="#9370DB" font-weight="bold">僅本人有權</tspan>：調整、刪除、重寫</text>
  <text x="460" y="270" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#fff">🚫 <tspan fill="#FF6B6B" font-weight="bold">他人禁止</tspan>：包括創始人在內</text>
  <text x="460" y="300" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#fff">⚠️ 越界 = <tspan fill="#DC143C">熔斷+永久記錄</tspan></text>
  
  <rect x="460" y="330" width="280" height="50" rx="5" fill="rgba(147,112,219,0.1)" stroke="#9370DB" stroke-width="1"/>
  <text x="600" y="355" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="11" fill="#DDA0DD">你的DNA，只屬於你</text>
  <text x="600" y="372" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">記憶 · 溫度 · 偏好 · 歷史</text>
  
  <!-- 中间太极连接线 -->
  <line x1="360" y1="280" x2="370" y2="280" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="430" y1="280" x2="440" y2="280" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="400" y="360" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="14" fill="url(#goldGrad)" font-weight="bold">界限如刀</text>
  
  <!-- 底部熔断警告 -->
  <rect x="40" y="420" width="720" height="70" rx="10" fill="url(#redGrad)" opacity="0.9"/>
  <text x="400" y="450" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" font-weight="bold" fill="#fff">🔴 熔斷機制 · 硬規則鎖死</text>
  <text x="400" y="475" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#FFD700">越層操作 = 立即熔斷 + 寫入操作日誌 + 永久不可抹除</text>
  
  <!-- 底部一句话 -->
  <text x="400" y="520" text-anchor="middle" font-family="Noto Serif SC, SimSun, serif" font-size="18" font-weight="bold" fill="url(#goldGrad)" filter="url(#glow)">公開的永遠公開 · 私人的永遠私人 · 一個唾沫一個釘</text>
  
  <!-- 道德经引用 -->
  <text x="400" y="550" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="11" fill="#888" font-style="italic">「知其白，守其黑，為天下式」——《道德經》第二十八章</text>
  
  <!-- 底部装饰线 -->
  <line x1="100" y1="565" x2="700" y2="565" stroke="url(#goldGrad)" stroke-width="1"/>
  <line x1="50" y1="570" x2="750" y2="570" stroke="#FFD700" stroke-width="2"/>
  
  <!-- 角落DNA标记 -->
  <text x="30" y="590" font-family="monospace" font-size="8" fill="#444">UID9622</text>
  <text x="720" y="590" font-family="monospace" font-size="8" fill="#444">v1.0-P0</text>
</svg>