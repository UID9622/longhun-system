<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#32CD32"/>
      <stop offset="100%" style="stop-color:#228B22"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#051005"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="15" fill="url(#bgGrad)" stroke="#228B22" stroke-width="3"/>
  <rect x="20" y="20" width="560" height="60" rx="10" fill="rgba(34,139,34,0.3)"/>
  <text x="300" y="60" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="28" font-weight="bold" fill="#32CD32">🌐 第一層：系統公開層</text>
  <text x="300" y="110" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="14" fill="#90EE90">敞亮層 · 可審計層</text>
  <text x="50" y="160" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#fff">✅ <tspan fill="#32CD32" font-weight="bold">可查</tspan>：人人可看，無黑箱</text>
  <text x="50" y="210" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#fff">✅ <tspan fill="#32CD32" font-weight="bold">可審計</tspan>：人人可監督、提建議</text>
  <text x="50" y="260" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#fff">❌ <tspan fill="#FF6B6B" font-weight="bold">不可私改</tspan>：包括創始人在內</text>
  <text x="50" y="310" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#FFD700">📋 修改須走：公開流程 + 一票否決</text>
  <text x="300" y="370" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="20" fill="#32CD32" font-weight="bold">寫進系統的，全部敞亮</text>
</svg>